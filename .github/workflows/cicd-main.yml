name: CICD NeMo
on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"

  # Allow MCore to trigger this workflow remotely for compatibility testing
  workflow_dispatch:
    inputs:
      mcore_ref:
        description: "MCore commit SHA to test against"
        required: false
        type: string
      mcore_repo:
        description: "MCore repository URL (for fetching from forks)"
        required: false
        type: string
        default: "https://github.com/NVIDIA/Megatron-LM.git"
      mcore_variant:
        description: "MCore branch variant to test (pinned commits from scripts/switch_mcore.sh)"
        required: false
        type: choice
        options:
          - "main"
          - "dev"
          - "both"
        default: "main"
      test_suite:
        description: "Test suite to run"
        required: false
        type: choice
        options:
          - "all"
          - "unit-only"
          - "functional-only"
        default: "all"
      triggered_by:
        description: "Trigger source (for tracking)"
        required: false
        type: string
        default: "manual"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.label.name || 'main' }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  container-registry: nemoci.azurecr.io

jobs:
  pre-flight:
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.73.2
    with:
      default_runner_prefix: ${{ vars.DEFAULT_RUNNER_PREFIX }}
      non_nvidia_runner_prefix: ${{ vars.NON_NVIDIA_RUNNER_PREFIX }}
      default_test_data_path: ${{ vars.DEFAULT_TEST_DATA_PATH }}
      non_nvidia_test_data_path: ${{ vars.NON_NVIDIA_TEST_DATA_PATH }}
    secrets:
      NVIDIA_MANAGEMENT_ORG_PAT: ${{ secrets.NVIDIA_MANAGEMENT_ORG_PAT }}

  setup-mcore:
    name: Resolve MCore variants
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.resolve.outputs.variants }}
      dev_commit: ${{ steps.resolve.outputs.dev_commit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve MCore variants
        id: resolve
        run: |
          DEV_COMMIT=$(grep '^DEV_COMMIT=' scripts/switch_mcore.sh | cut -d'"' -f2)
          echo "dev_commit=$DEV_COMMIT" >> "$GITHUB_OUTPUT"

          if [ -n "${{ github.event.inputs.mcore_ref }}" ]; then
            echo 'variants=["custom"]' >> "$GITHUB_OUTPUT"
          else
            VARIANT="${{ github.event.inputs.mcore_variant || 'main' }}"
            case "$VARIANT" in
              main) echo 'variants=["main"]' >> "$GITHUB_OUTPUT" ;;
              dev)  echo 'variants=["dev"]' >> "$GITHUB_OUTPUT" ;;
              both) echo 'variants=["main","dev"]' >> "$GITHUB_OUTPUT" ;;
            esac
          fi

  lint-check:
    name: Lint check
    runs-on: ubuntu-latest
    needs: [pre-flight]
    if: |
      (
        needs.pre-flight.outputs.is_deployment_workflow == 'false'
          && needs.pre-flight.outputs.is_ci_workload == 'true'
      ) || (
        needs.pre-flight.outputs.is_deployment_workflow == 'false'
          && needs.pre-flight.outputs.is_ci_workload == 'false'
          && needs.pre-flight.outputs.docs_only == 'false'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule to commit: ${{ github.event.inputs.mcore_ref }}"
          echo "📍 MCore repo: ${{ github.event.inputs.mcore_repo || 'https://github.com/NVIDIA/Megatron-LM.git' }}"
          echo "🎯 Triggered by: ${{ github.event.inputs.triggered_by }}"

          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

      - name: Set environment for MCore testing
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "MCORE_TRIGGERED_TESTING=true" | tee -a "$GITHUB_ENV"
          echo "⚙️ MCore testing mode: skipping --locked flag because lockfile was generated with different MCore version"

      - name: Check lint
        run: |
          pip install pre-commit==3.6.0
          pre-commit install
          pre-commit run --all-files --show-diff-on-failure --color=always

  cicd-wait-in-queue:
    needs: [pre-flight, lint-check]
    runs-on: ubuntu-latest
    environment: test
    if: |
      !(needs.pre-flight.outputs.is_ci_workload == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      || needs.pre-flight.outputs.docs_only == 'true')
    steps:
      - name: Running CI tests
        run: |
          echo "Running CI tests"

  cicd-container-build:
    needs: [pre-flight, cicd-wait-in-queue, setup-mcore]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    environment: nemo-ci
    name: "Container Build (${{ matrix.mcore_variant }})"
    strategy:
      fail-fast: false
      matrix:
        mcore_variant: ${{ fromJSON(needs.setup-mcore.outputs.variants) }}
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve MCore ref for variant
        id: mcore
        run: |
          VARIANT="${{ matrix.mcore_variant }}"
          case "$VARIANT" in
            dev)
              echo "ref=${{ needs.setup-mcore.outputs.dev_commit }}" >> "$GITHUB_OUTPUT"
              echo "repo=origin" >> "$GITHUB_OUTPUT"
              echo "skip_locked=true" >> "$GITHUB_OUTPUT"
              ;;
            custom)
              echo "ref=${{ github.event.inputs.mcore_ref }}" >> "$GITHUB_OUTPUT"
              echo "repo=${{ github.event.inputs.mcore_repo || 'origin' }}" >> "$GITHUB_OUTPUT"
              echo "skip_locked=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ref=" >> "$GITHUB_OUTPUT"
              echo "repo=" >> "$GITHUB_OUTPUT"
              echo "skip_locked=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Update MCore submodule
        if: steps.mcore.outputs.ref != ''
        run: |
          echo "🔄 Updating MCore submodule to: ${{ steps.mcore.outputs.ref }}"
          echo "📍 Repo: ${{ steps.mcore.outputs.repo }}"
          echo "🎯 Variant: ${{ matrix.mcore_variant }}"

          cd 3rdparty/Megatron-LM
          git fetch ${{ steps.mcore.outputs.repo }} ${{ steps.mcore.outputs.ref }}
          git checkout ${{ steps.mcore.outputs.ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ steps.mcore.outputs.ref }}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            echo "Expected: ${EXPECTED_COMMIT}"
            echo "Actual:   ${ACTUAL_COMMIT}"
            exit 1
          fi

          git log -1 --pretty=format:"📝 Commit: %H%n👤 Author: %an%n📅 Date: %ad%n💬 Message: %s" --date=short
          cd ../..
          echo "MCORE_COMMIT_SHA=${EXPECTED_COMMIT}" | tee -a "$GITHUB_ENV"

      - name: Set environment for non-main MCore testing
        if: steps.mcore.outputs.skip_locked == 'true'
        run: |
          echo "MCORE_TRIGGERED_TESTING=true" | tee -a "$GITHUB_ENV"
          echo "⚙️ MCore testing mode: skipping --locked flag because lockfile was generated with different MCore version"

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Get PR info
        id: get-pr-info
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        uses: nv-gha-runners/get-pr-info@main

      - name: Install Azure CLI
        shell: bash
        run: |
          echo "::group::Install Azure CLI"
          # Create systemd override for proper dependencies
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          echo "::endgroup::"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure ACR Login
        shell: bash
        run: |
          az acr login --name nemoci

      - name: Install GH CLI
        shell: bash
        run: |
          apt-get update
          apt-get install -y gh

      - name: Get last merged PR
        id: cache_from
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_PRS=$(gh api graphql -f query='
            query {
              repository(owner: "NVIDIA-NeMo", name: "Megatron-Bridge") {
                pullRequests(states: MERGED, first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                  nodes {
                    number
                  }
                }
              }
            }' | jq -r '.data.repository.pullRequests.nodes[].number' | while read -r number; do
              echo "type=registry,ref=${{ env.container-registry }}/megatron-bridge:$number-buildcache,mode=max"
            done)

          echo "LAST_PRS<<EOF" | tee -a $GITHUB_OUTPUT
          echo "$LAST_PRS" | tee -a $GITHUB_OUTPUT
          echo "EOF" | tee -a $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute cache keys
        id: cache_keys
        shell: bash
        run: |
          VARIANT="${{ matrix.mcore_variant }}"
          PR_NUMBER="${{ fromJSON(steps.get-pr-info.outputs.pr-info || '{}').number }}"
          BRANCH_SANITIZED=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr -cd '[:alnum:]._-')
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            KEY="main"
          elif [[ -n "$PR_NUMBER" ]]; then
            KEY="$PR_NUMBER"
          else
            KEY="$BRANCH_SANITIZED"
          fi
          KEY="${KEY}-${VARIANT}"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "cache-to=type=registry,ref=${{ env.container-registry }}/megatron-bridge:${KEY}-buildcache,mode=max" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile.ci
          push: true
          context: .
          build-args: |
            FROM_IMAGE_NAME=nvcr.io/nvidia/pytorch:25.09-py3
            MCORE_TRIGGERED_TESTING=${{ env.MCORE_TRIGGERED_TESTING || 'false' }}
            MCORE_COMMIT_SHA=${{ env.MCORE_COMMIT_SHA || 'unknown' }}
          cache-from: |
            type=registry,ref=${{ env.container-registry }}/megatron-bridge:${{ steps.cache_keys.outputs.key }}-buildcache,mode=max
            type=registry,ref=${{ env.container-registry }}/megatron-bridge:main-${{ matrix.mcore_variant }}-buildcache,mode=max
            ${{ steps.cache_from.outputs.LAST_PRS }}
          cache-to: ${{ steps.cache_keys.outputs.cache-to }}
          no-cache: false
          tags: |
            ${{ env.container-registry }}/megatron-bridge:${{ steps.cache_keys.outputs.key }}
            ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}-${{ matrix.mcore_variant }}
          secrets: |
            GH_TOKEN=${{ secrets.PAT }}

  cicd-unit-tests:
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'unit-only')
    needs: [pre-flight, cicd-wait-in-queue, cicd-container-build, setup-mcore]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    name: "Unit Tests (${{ matrix.mcore_variant }})"
    strategy:
      fail-fast: false
      matrix:
        mcore_variant: ${{ fromJSON(needs.setup-mcore.outputs.variants) }}
    environment: nemo-ci
    env:
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve MCore ref for variant
        id: mcore
        run: |
          VARIANT="${{ matrix.mcore_variant }}"
          case "$VARIANT" in
            dev) echo "ref=${{ needs.setup-mcore.outputs.dev_commit }}" >> "$GITHUB_OUTPUT" ;;
            custom) echo "ref=${{ github.event.inputs.mcore_ref }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "ref=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Update MCore submodule
        if: steps.mcore.outputs.ref != ''
        run: |
          cd 3rdparty/Megatron-LM
          git fetch origin ${{ steps.mcore.outputs.ref }}
          git checkout ${{ steps.mcore.outputs.ref }}
          echo "✅ MCore updated to $(git rev-parse --short HEAD)"

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: Launch_Unit_Tests
          timeout: 15
          is_unit_test: "true"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}-${{ matrix.mcore_variant }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
          mcore-ref: ${{ steps.mcore.outputs.ref }}

  cicd-functional-tests:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        mcore_variant: ${{ fromJSON(needs.setup-mcore.outputs.variants) }}
        script:
          - L2_Launch_training
          - L2_Launch_converter
          - L2_Launch_models_deepseek
          - L2_Launch_models_gemma
          - L2_Launch_models_gemma_vl
          - L2_Launch_models_glm
          - L2_Launch_models_gpt_oss
          - L2_Launch_models_llama_nemotron
          - L2_Launch_models_ministral3
          - L2_Launch_models_mistral
          - L2_Launch_models_nemotron
          - L2_Launch_models_nemotronh
          - L2_Launch_models_nemotronh_quantization
          - L2_Launch_models_nemotron_vl
          - L2_Launch_models_olmoe
          - L2_Launch_models_qwen
          - L2_Launch_models_qwen_quantization
          - L2_Launch_models_qwen_vl
          - L2_Launch_models_qwen35_vl
          - L2_Launch_models_qwen_vl_quantization
          - L2_Launch_recipes_gemma_vl
          - L2_Launch_recipes_gpt_oss
          - L2_Launch_recipes_llama_1b
          - L2_Launch_recipes_llama_3b
          - L2_Launch_recipes_llama_distill
          - L2_Launch_recipes_ministral3
          - L2_Launch_recipes_nemotronh
          - L2_Launch_recipes_qwen
          - L2_Launch_data
          - L2_Launch_post_training_quantization
          - L2_Launch_quantization_aware_training
          # - L2_Launch_quantization_export
          - L2_Launch_recipes_llama_cuda_graphs
          - L2_Launch_utils
        include:
          - script: L2_Launch_training
            timeout: 50
    needs: [pre-flight, cicd-unit-tests, setup-mcore]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only')
    name: "${{ matrix.script }} (${{ matrix.mcore_variant }})"
    environment: nemo-ci
    env:
      HF_HOME: /home/TestData/HF_HOME
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve MCore ref for variant
        id: mcore
        run: |
          VARIANT="${{ matrix.mcore_variant }}"
          case "$VARIANT" in
            dev) echo "ref=${{ needs.setup-mcore.outputs.dev_commit }}" >> "$GITHUB_OUTPUT" ;;
            custom) echo "ref=${{ github.event.inputs.mcore_ref }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "ref=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Update MCore submodule
        if: steps.mcore.outputs.ref != ''
        run: |
          cd 3rdparty/Megatron-LM
          git fetch origin ${{ steps.mcore.outputs.ref }}
          git checkout ${{ steps.mcore.outputs.ref }}
          echo "✅ MCore updated to $(git rev-parse --short HEAD)"

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: ${{ matrix.script }}
          timeout: ${{ matrix.timeout || 30 }}
          is_unit_test: "false"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}-${{ matrix.mcore_variant }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
          mcore-ref: ${{ steps.mcore.outputs.ref }}

  Nemo_CICD_Test:
    needs:
      - pre-flight
      - cicd-unit-tests
      - cicd-functional-tests
    if: |
      (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || always()
      )
      && !cancelled()
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get workflow result
        id: result
        shell: bash -x -e -u -o pipefail {0}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          SKIPPING_IS_ALLOWED: ${{ needs.pre-flight.outputs.docs_only == 'true' || needs.pre-flight.outputs.is_deployment_workflow == 'true' || needs.pre-flight.outputs.is_ci_workload == 'true' || inputs.test_suite == 'unit-only' || inputs.test_suite == 'functional-only' }}
        run: |
          FAILED_JOBS=$(gh run view $GITHUB_RUN_ID --json jobs --jq '[.jobs[] | select(.status == "completed" and .conclusion != "success")] | length') || echo 0

          if [ "${FAILED_JOBS:-0}" -eq 0 ] || [ "$SKIPPING_IS_ALLOWED" == "true" ]; then
              echo "✅ All previous jobs completed successfully"
              exit 0
          else
              echo "❌ Found $FAILED_JOBS failed job(s)"
              # Show which jobs failed
              gh run view $GITHUB_RUN_ID --json jobs --jq '.jobs[] | select(.status == "completed" and .conclusion != "success") | .name'
              exit 1
          fi

  Coverage_Fake:
    runs-on: ubuntu-latest
    needs: [Nemo_CICD_Test, pre-flight]
    if: |
      (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      )
      && needs.pre-flight.outputs.is_ci_workload == 'false'
      && !cancelled()
    steps:
      - name: Generate fake coverage report
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'No code changes - coverage check skipped',
              context: 'codecov/patch'
            });

  Coverage:
    runs-on: ubuntu-latest
    needs: [Nemo_CICD_Test, pre-flight]
    if: |
      (
        (needs.pre-flight.outputs.is_ci_workload == 'true' && !failure())
        || success()
      )
      && !cancelled()
    strategy:
      matrix:
        flag:
          - unit-test
          - e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage reports of current branch
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-${{ matrix.flag }}-*

      - name: Get total coverage of current branch
        shell: bash -x -e -u -o pipefail {0}
        if: always()
        run: |
          pip install coverage[toml]

          ls -al .
          ls -al coverage-*/
          coverage combine --keep $(ls coverage-*/.coverage)
          coverage report -i
          rm -rf coverage-*
          ls -al

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          flags: ${{ matrix.flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.flag }}-aggregated
          path: |
            .coverage
          include-hidden-files: true
