name: CICD NeMo
on:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
      - "deploy-release/*"

  # Allow MCore to trigger this workflow remotely for compatibility testing
  workflow_dispatch:
    inputs:
      mcore_ref:
        description: "MCore commit SHA to test against"
        required: false
        type: string
      mcore_repo:
        description: "MCore repository URL (for fetching from forks)"
        required: false
        type: string
        default: "https://github.com/NVIDIA/Megatron-LM.git"
      test_suite:
        description: "Test suite to run"
        required: false
        type: choice
        options:
          - "all"
          - "unit-only"
          - "functional-only"
        default: "all"
      triggered_by:
        description: "Trigger source (for tracking)"
        required: false
        type: string
        default: "manual"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.label.name || 'main' }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  container-registry: nemoci.azurecr.io

jobs:
  pre-flight:
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.73.2
    with:
      default_runner_prefix: ${{ vars.DEFAULT_RUNNER_PREFIX }}
      non_nvidia_runner_prefix: ${{ vars.NON_NVIDIA_RUNNER_PREFIX }}
      default_test_data_path: ${{ vars.DEFAULT_TEST_DATA_PATH }}
      non_nvidia_test_data_path: ${{ vars.NON_NVIDIA_TEST_DATA_PATH }}
    secrets:
      NVIDIA_MANAGEMENT_ORG_PAT: ${{ secrets.NVIDIA_MANAGEMENT_ORG_PAT }}

  lint-check:
    name: Lint check
    runs-on: ubuntu-latest
    needs: [pre-flight]
    if: |
      (
        needs.pre-flight.outputs.is_deployment_workflow == 'false'
          && needs.pre-flight.outputs.is_ci_workload == 'true'
      ) || (
        needs.pre-flight.outputs.is_deployment_workflow == 'false'
          && needs.pre-flight.outputs.is_ci_workload == 'false'
          && needs.pre-flight.outputs.docs_only == 'false'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule to commit: ${{ github.event.inputs.mcore_ref }}"
          echo "📍 MCore repo: ${{ github.event.inputs.mcore_repo || 'https://github.com/NVIDIA/Megatron-LM.git' }}"
          echo "🎯 Triggered by: ${{ github.event.inputs.triggered_by }}"

          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

      - name: Set environment for MCore testing
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "MCORE_TRIGGERED_TESTING=true" | tee -a "$GITHUB_ENV"
          echo "⚙️ MCore testing mode: skipping --locked flag because lockfile was generated with different MCore version"

      - name: Check lint
        run: |
          pip install pre-commit==3.6.0
          pre-commit install
          pre-commit run --all-files --show-diff-on-failure --color=always

  cicd-wait-in-queue:
    needs: [pre-flight, lint-check]
    runs-on: ubuntu-latest
    environment: test
    if: |
      !(needs.pre-flight.outputs.is_ci_workload == 'true'
      || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      || needs.pre-flight.outputs.docs_only == 'true')
    steps:
      - name: Running CI tests
        run: |
          echo "Running CI tests"

  cicd-container-build:
    needs: [pre-flight, cicd-wait-in-queue]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    environment: nemo-ci
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
    steps:
      - name: Get PR info
        id: get-pr-info
        if: startsWith(github.ref, 'refs/heads/pull-request/')
        uses: nv-gha-runners/get-pr-info@main

      - name: Get merge commit sha
        shell: bash -x -e -u -o pipefail {0}
        id: sha
        env:
          IS_PR: ${{ startsWith(github.ref, 'refs/heads/pull-request/') }}
        run: |
          if [[ "$IS_PR" == "true" ]]; then
            SHA=${{ fromJSON(steps.get-pr-info.outputs.pr-info || '{}').merge_commit_sha }}
          else
            SHA=${GITHUB_SHA}
          fi
          echo "main=${SHA}" | tee -a "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ steps.sha.outputs.main }}

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule to commit: ${{ github.event.inputs.mcore_ref }}"
          echo "📌 MCore branch: ${{ github.event.inputs.mcore_branch || 'unknown' }}"
          echo "📍 MCore repo: ${{ github.event.inputs.mcore_repo || 'https://github.com/NVIDIA/Megatron-LM.git' }}"
          echo "🎯 Triggered by: ${{ github.event.inputs.triggered_by }}"

          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          # Verify the checkout was successful
          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "✅ MCore submodule updated successfully"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          git log -1 --pretty=format:"📝 Commit: %H%n👤 Author: %an%n📅 Date: %ad%n💬 Message: %s" --date=short
          cd ../..

          # Store for Docker build arg
          echo "MCORE_COMMIT_SHA=${EXPECTED_COMMIT}" | tee -a "$GITHUB_ENV"

      - name: Set environment for MCore testing
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "MCORE_TRIGGERED_TESTING=true" | tee -a "$GITHUB_ENV"
          echo "⚙️ MCore testing mode: skipping --locked flag because lockfile was generated with different MCore version"

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Azure CLI
        shell: bash
        run: |
          echo "::group::Install Azure CLI"
          # Create systemd override for proper dependencies
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          echo "::endgroup::"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure ACR Login
        shell: bash
        run: |
          az acr login --name nemoci

      - name: Install GH CLI
        shell: bash
        run: |
          apt-get update
          apt-get install -y gh

      - name: Get last merged PR
        id: cache_from
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_PRS=$(gh api graphql -f query='
            query {
              repository(owner: "NVIDIA-NeMo", name: "Megatron-Bridge") {
                pullRequests(states: MERGED, first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                  nodes {
                    number
                  }
                }
              }
            }' | jq -r '.data.repository.pullRequests.nodes[].number' | while read -r number; do
              echo "type=registry,ref=${{ env.container-registry }}/megatron-bridge:$number-buildcache,mode=max"
            done)

          echo "LAST_PRS<<EOF" | tee -a $GITHUB_OUTPUT
          echo "$LAST_PRS" | tee -a $GITHUB_OUTPUT
          echo "EOF" | tee -a $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute cache keys
        id: cache_keys
        shell: bash
        run: |
          PR_NUMBER="${{ fromJSON(steps.get-pr-info.outputs.pr-info || '{}').number }}"
          BRANCH_SANITIZED=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr -cd '[:alnum:]._-')
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            KEY="main"
          elif [[ -n "$PR_NUMBER" ]]; then
            KEY="$PR_NUMBER"
          else
            KEY="$BRANCH_SANITIZED"
          fi
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "cache-to=type=registry,ref=${{ env.container-registry }}/megatron-bridge:${KEY}-buildcache,mode=max" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile.ci
          push: true
          context: .
          build-args: |
            FROM_IMAGE_NAME=nvcr.io/nvidia/pytorch:25.09-py3
            MCORE_TRIGGERED_TESTING=${{ env.MCORE_TRIGGERED_TESTING || 'false' }}
            MCORE_COMMIT_SHA=${{ env.MCORE_COMMIT_SHA || 'unknown' }}
          cache-from: |
            type=registry,ref=${{ env.container-registry }}/megatron-bridge:${{ steps.cache_keys.outputs.key }}-buildcache,mode=max
            type=registry,ref=${{ env.container-registry }}/megatron-bridge:main-buildcache,mode=max
            ${{ steps.cache_from.outputs.LAST_PRS }}
          cache-to: ${{ steps.cache_keys.outputs.cache-to }}
          no-cache: false
          tags: |
            ${{ env.container-registry }}/megatron-bridge:${{ steps.cache_keys.outputs.key }}
            ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          secrets: |
            GH_TOKEN=${{ secrets.PAT }}

  check-labels:
    runs-on: ubuntu-latest
    needs: [pre-flight]
    outputs:
      needs_more_tests: ${{ steps.check.outputs.needs_more_tests }}
    steps:
      - name: Check PR labels
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref }}" == refs/heads/pull-request/* ]]; then
            PR_NUMBER=$(echo "${{ github.ref }}" | sed 's|refs/heads/pull-request/||')
            LABELS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "needs-more-tests"; then
              echo "needs_more_tests=true" >> $GITHUB_OUTPUT
            else
              echo "needs_more_tests=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "needs_more_tests=false" >> $GITHUB_OUTPUT
          fi

  cicd-unit-tests-core:
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'unit-only')
    needs: [pre-flight, cicd-wait-in-queue, cicd-container-build]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    name: Launch_Unit_Tests_Core
    environment: nemo-ci
    env:
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule for unit tests..."
          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "🧪 UNIT TESTS - MCore verification:"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          echo "✅ MCore commit verified"
          echo "📦 Container: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}"
          git log -1 --oneline

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: Launch_Unit_Tests_Core
          timeout: 18
          is_unit_test: "true"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2

  cicd-unit-tests-diffusion:
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'unit-only')
    needs: [pre-flight, cicd-wait-in-queue, cicd-container-build]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    name: Launch_Unit_Tests_Diffusion
    environment: nemo-ci
    env:
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule for unit tests..."
          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "🧪 UNIT TESTS - MCore verification:"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          echo "✅ MCore commit verified"
          echo "📦 Container: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}"
          git log -1 --oneline

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: Launch_Unit_Tests_Diffusion
          timeout: 18
          is_unit_test: "true"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2

  # L0: runs on every PR, main push, and schedule
  cicd-functional-tests-l0:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - script: L0_Launch_training
            timeout: 50
          - script: L0_Launch_converter
          - script: L0_Launch_data
          - script: L0_Launch_models_deepseek
          - script: L0_Launch_models_qwen3
          - script: L0_Launch_recipes_llama_1b
          - script: L0_Launch_utils
    needs: [pre-flight, cicd-unit-tests-core, cicd-unit-tests-diffusion]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only')
    name: ${{ matrix.script }}
    environment: nemo-ci
    env:
      HF_HOME: /home/TestData/HF_HOME
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule for functional tests..."
          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "🧪 FUNCTIONAL TESTS - MCore verification:"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          echo "✅ MCore commit verified"
          echo "📦 Container: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}"
          git log -1 --oneline

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: ${{ matrix.script }}
          timeout: ${{ fromJSON(matrix.timeout || '30') }}
          is_unit_test: "false"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2

  # L1: runs on main push, schedule, and PRs with "needs-more-tests" label
  cicd-functional-tests-l1:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - script: L1_Launch_models_gemma1
          - script: L1_Launch_models_gemma2
          - script: L1_Launch_models_gemma3
          - script: L1_Launch_models_glm
          - script: L1_Launch_models_gpt_oss
          - script: L1_Launch_models_ministral3
          - script: L1_Launch_models_mistral
          - script: L1_Launch_models_nemotron
          - script: L1_Launch_models_nemotronh
          - script: L1_Launch_models_olmoe
          - script: L1_Launch_models_qwen2
          - script: L1_Launch_models_qwen25_vl
          - script: L1_Launch_models_qwen35_vl
          - script: L1_Launch_models_qwen3_vl
          - script: L1_Launch_post_training_quantization
          # - script: L1_Launch_quantization_export
          - script: L1_Launch_recipes_gpt_oss
          - script: L1_Launch_recipes_llama_3b
          - script: L1_Launch_recipes_ministral3
          - script: L1_Launch_recipes_nemotronh
          - script: L1_Launch_recipes_qwen
    needs: [pre-flight, cicd-unit-tests-core, cicd-unit-tests-diffusion, check-labels]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.check-labels.outputs.needs_more_tests == 'true')
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only')
    name: ${{ matrix.script }}
    environment: nemo-ci
    env:
      HF_HOME: /home/TestData/HF_HOME
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule for functional tests..."
          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "🧪 FUNCTIONAL TESTS - MCore verification:"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          echo "✅ MCore commit verified"
          echo "📦 Container: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}"
          git log -1 --oneline

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: ${{ matrix.script }}
          timeout: ${{ fromJSON(matrix.timeout || '30') }}
          is_unit_test: "false"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2

  # L2: runs on schedule (nightly/weekly) and workflow_dispatch only
  cicd-functional-tests-l2:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - script: L2_Launch_ckpts_mbridge_to_mlm_llama32_1b
          - script: L2_Launch_ckpts_mlm_to_mbridge_llama32_1b
          - script: L2_Launch_ckpts_mbridge_to_mlm_qwen3_4b
          - script: L2_Launch_ckpts_mlm_to_mbridge_qwen3_4b
          # NemotronH 4B ckpt jobs skipped until hybrid_layer_pattern rename lands
          # - script: L2_Launch_ckpts_mbridge_to_mlm_nemotronh_4b
          # - script: L2_Launch_ckpts_mlm_to_mbridge_nemotronh_4b
          - script: L2_Launch_models_gemma_vl
          - script: L2_Launch_models_llama_nemotron
          - script: L2_Launch_models_nemotron_vl
          - script: L2_Launch_models_nemotronh_quantization
          - script: L2_Launch_models_qwen_quantization
          - script: L2_Launch_models_qwen_vl_quantization
          - script: L2_Launch_quantization_aware_training
          - script: L2_Launch_recipes_gemma_vl
          - script: L2_Launch_recipes_llama_cuda_graphs
          - script: L2_Launch_recipes_llama_distill
          - script: L2_Launch_recipes_qwen_vl
          - script: L2_Launch_models_flux
          - script: L2_Launch_models_wan
    needs: [pre-flight, cicd-unit-tests-core, cicd-unit-tests-diffusion]
    runs-on: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2
    if: |
      (
        success()
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || needs.pre-flight.outputs.force_run_all == 'true'
      )
      && !cancelled()
      && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only')
    name: ${{ matrix.script }}
    environment: nemo-ci
    env:
      HF_HOME: /home/TestData/HF_HOME
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update MCore submodule (if triggered from MCore)
        if: ${{ github.event.inputs.mcore_ref != '' }}
        run: |
          echo "🔄 Updating MCore submodule for functional tests..."
          cd 3rdparty/Megatron-LM
          git fetch ${{ github.event.inputs.mcore_repo || 'origin' }} ${{ github.event.inputs.mcore_ref }}
          git checkout ${{ github.event.inputs.mcore_ref }}

          ACTUAL_COMMIT=$(git rev-parse HEAD)
          EXPECTED_COMMIT="${{ github.event.inputs.mcore_ref }}"

          echo "🧪 FUNCTIONAL TESTS - MCore verification:"
          echo "Expected: ${EXPECTED_COMMIT}"
          echo "Actual:   ${ACTUAL_COMMIT}"

          if [ "${ACTUAL_COMMIT}" != "${EXPECTED_COMMIT}" ]; then
            echo "❌ ERROR: MCore commit mismatch!"
            exit 1
          fi

          echo "✅ MCore commit verified"
          echo "📦 Container: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}"
          git log -1 --oneline

      - name: main
        uses: ./.github/actions/test-template
        with:
          script: ${{ matrix.script }}
          timeout: ${{ fromJSON(matrix.timeout || '30') }}
          is_unit_test: "false"
          has-azure-credentials: "true"
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PAT: ${{ secrets.PAT }}
          container-image: ${{ env.container-registry }}/megatron-bridge:${{ github.sha }}
          test-data-path: ${{ needs.pre-flight.outputs.test_data_path }}
          runner: ${{ needs.pre-flight.outputs.runner_prefix }}-gpu-x2

  Nemo_CICD_Test:
    needs:
      - pre-flight
      - check-labels
      - cicd-unit-tests-core
      - cicd-unit-tests-diffusion
      - cicd-functional-tests-l0
      - cicd-functional-tests-l1
      - cicd-functional-tests-l2
    if: |
      (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
        || needs.pre-flight.outputs.is_ci_workload == 'true'
        || always()
      )
      && !cancelled()
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get workflow result
        id: result
        shell: bash -e -u -o pipefail {0}
        env:
          GH_TOKEN: ${{ github.token }}
          # A tier is "expected" if its if-condition (excluding success()/is_ci_workload/force_run_all) would be true.
          # Unexpected skips in an expected tier are failures.
          # is_ci_workload must be true, otherwise docs-only/deployment runs have no tests and trigger false positives.
          EXPECT_L0: ${{ needs.pre-flight.outputs.is_ci_workload == 'true' && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only') }}
          EXPECT_L1: ${{ needs.pre-flight.outputs.is_ci_workload == 'true' && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only') && (github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.check-labels.outputs.needs_more_tests == 'true') }}
          EXPECT_L2: ${{ needs.pre-flight.outputs.is_ci_workload == 'true' && (github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'functional-only') && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          FAILED_JOBS=$(gh run view $GITHUB_RUN_ID --json jobs --jq '[.jobs[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped")] | length') || echo 0

          UNEXPECTED_SKIPS=0
          check_tier_skips() {
            local tier="$1" expect="$2"
            [ "$expect" != "true" ] && return
            local n
            n=$(gh run view $GITHUB_RUN_ID --json jobs --jq --arg p "${tier}_" \
              '[.jobs[] | select(.name | startswith($p)) | select(.conclusion == "skipped")] | length') || n=0
            if [ "${n:-0}" -gt 0 ]; then
              echo "❌ Found $n unexpectedly skipped ${tier} job(s):"
              gh run view $GITHUB_RUN_ID --json jobs --jq --arg p "${tier}_" \
                '.jobs[] | select(.name | startswith($p)) | select(.conclusion == "skipped") | .name'
              UNEXPECTED_SKIPS=$((UNEXPECTED_SKIPS + n))
            fi
          }

          check_tier_skips "L0" "$EXPECT_L0"
          check_tier_skips "L1" "$EXPECT_L1"
          check_tier_skips "L2" "$EXPECT_L2"

          if [ "${FAILED_JOBS:-0}" -gt 0 ]; then
            echo "❌ Found $FAILED_JOBS failed job(s):"
            gh run view $GITHUB_RUN_ID --json jobs --jq '.jobs[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped") | .name'
          fi

          if [ "${FAILED_JOBS:-0}" -gt 0 ] || [ "${UNEXPECTED_SKIPS:-0}" -gt 0 ]; then
            exit 1
          fi

          echo "✅ All previous jobs completed successfully"
          exit 0

  Coverage_Fake:
    runs-on: ubuntu-latest
    needs: [Nemo_CICD_Test, pre-flight]
    if: |
      always()
      && !cancelled()
      && needs.pre-flight.outputs.is_ci_workload == 'false'
      && (
        needs.pre-flight.outputs.docs_only == 'true'
        || needs.pre-flight.outputs.is_deployment_workflow == 'true'
      )
    steps:
      - name: Generate fake coverage report
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'No code changes - coverage check skipped',
              context: 'codecov/patch'
            });

  Coverage:
    runs-on: ubuntu-latest
    needs: [Nemo_CICD_Test, pre-flight]
    if: |
      needs.Nemo_CICD_Test.result == 'success'
      && needs.pre-flight.outputs.docs_only == 'false'
      && needs.pre-flight.outputs.is_deployment_workflow == 'false'
      && !cancelled()
    strategy:
      matrix:
        flag:
          - unit-test
          - e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage reports of current branch
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-${{ matrix.flag }}-*

      - name: Get total coverage of current branch
        shell: bash -x -e -u -o pipefail {0}
        if: always()
        run: |
          pip install coverage[toml]

          ls -al .
          ls -al coverage-*/
          coverage combine --keep $(ls coverage-*/.coverage)
          coverage report -i
          rm -rf coverage-*
          ls -al

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          flags: ${{ matrix.flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.flag }}-aggregated
          path: |
            .coverage
          include-hidden-files: true
