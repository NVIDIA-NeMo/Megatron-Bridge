name: "Cache HuggingFace Model"

on:
  workflow_dispatch:
    inputs:
      hf-model-id:
        type: string
        description: HuggingFace repo ID of the model to cache
        required: true

jobs:
  download:
    name: Download Model
    runs-on: self-hosted-nemo
    env:
      HF_HUB_OFFLINE: 0
      HF_HOME: /mnt/datadrive/TestData/HF_HOME
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          TRANSFORMERS_REQUIREMENT=$(
            python - "${GITHUB_WORKSPACE}/pyproject.toml" <<'PY'
          import re
          import sys
          import tomllib

          with open(sys.argv[1], "rb") as pyproject:
              dependencies = tomllib.load(pyproject)["project"]["dependencies"]

          pattern = re.compile(r"^transformers(?:$|[\s\[<>=!~;@])", re.IGNORECASE)
          requirement = next((item for item in dependencies if pattern.match(item)), None)
          if requirement is None:
              raise SystemExit("Transformers requirement not found in pyproject.toml")
          sys.stdout.write(requirement)
          PY
          )
          pip install torch "${TRANSFORMERS_REQUIREMENT}" "huggingface_hub[cli]"

      - name: Log in to HuggingFace
        env:
          HF_ACCESS_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
        run: |
          hf auth login --token ${HF_ACCESS_TOKEN}

      - name: Download model
        env:
          MODEL_ID: ${{ github.event.inputs.hf-model-id }}
        shell: python
        run: |
          import os
          from transformers import AutoModel
          _ = AutoModel.from_pretrained(os.getenv("MODEL_ID"))
