name: Sync skills → agent dirs

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "AGENTS.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Sync skills/ into agent dirs
        run: |
          for dir in .claude .agents; do
            rsync -av --delete skills/ "$dir/skills/"
          done

      - name: Symlink AGENTS.md → CLAUDE.md
        run: '[ -f AGENTS.md ] && ln -sf AGENTS.md CLAUDE.md || true'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/skills/ .agents/skills/ CLAUDE.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(beep boop 🤖): sync skills/ → .claude/skills/, .agents/skills/ and AGENTS.md → CLAUDE.md"
          git push origin main
