version = 1
revision = 2
requires-python = "==3.12.*"

[options]
prerelease-mode = "allow"

[manifest]
overrides = [
    { name = "av", marker = "sys_platform == 'never'" },
    { name = "cachetools", specifier = ">=5.0.0" },
    { name = "cryptography", specifier = ">=43.0.0,<47" },
    { name = "langchain", specifier = ">=0.3.28" },
    { name = "langchain-core", specifier = ">=0.3.80" },
    { name = "mlflow", specifier = ">=3.9.0" },
    { name = "nvidia-cudnn-frontend", specifier = "==1.23.0" },
    { name = "nvidia-cutlass-dsl", extras = ["cu13"], marker = "sys_platform == 'never'" },
    { name = "nvidia-modelopt", specifier = "==0.44.0rc5", index = "https://pypi.nvidia.com/" },
    { name = "onnx", marker = "python_full_version < '3.13'", specifier = ">=1.21.0" },
    { name = "torch", marker = "sys_platform == 'never'" },
    { name = "torchvision", marker = "sys_platform == 'never'" },
    { name = "transformer-engine", git = "https://github.com/NVIDIA/TransformerEngine.git?rev=main" },
    { name = "triton", marker = "sys_platform == 'never'" },
    { name = "urllib3", specifier = ">=2.6.3" },
]
