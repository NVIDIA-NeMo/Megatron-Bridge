instances:
  - url: megatron-bridge.docs.buildwithfern.com/nemo/megatron-bridge
    custom-domain: docs.nvidia.com/nemo/megatron-bridge
    multi-source: true

title: NVIDIA NeMo Megatron Bridge

global-theme: nvidia

logo:
  href: /nemo/megatron-bridge/nightly
  right-text: Megatron Bridge

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Megatron-Bridge

versions:
  - display-name: Nightly
    path: versions/nightly.yml
    slug: nightly
  - display-name: "v0.4 (26.04)"
    path: versions/v0.4.yml
    slug: v0.4

redirects:
  - source: "/nemo/megatron-bridge/index.html"
    destination: "/nemo/megatron-bridge/nightly"
  - source: "/nemo/megatron-bridge/index"
    destination: "/nemo/megatron-bridge/nightly"
  - source: "/nemo/megatron-bridge/nightly/:path*/index.html"
    destination: "/nemo/megatron-bridge/nightly/:path*"
  - source: "/nemo/megatron-bridge/:path*/index.html"
    destination: "/nemo/megatron-bridge/:path*"
  - source: "/nemo/megatron-bridge/:path*.html"
    destination: "/nemo/megatron-bridge/:path*"
