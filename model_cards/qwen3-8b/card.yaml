# Draft agent-readable model support card.
# status: unverified | verified | unsupported | not_applicable
# last_verified: YYYY-MM-DD or null
# verified requires an immutable hf_revision, successful command(s), a concrete
# expected_result, and non-null last_verified.
# unverified may retain an older last_verified date when validation is stale.
# Every training item records the GPU type used for verification.

title: qwen3_8b
model:
  hf_id: Qwen/Qwen3-8B
  hf_revision: b968826d9c46dd6066d109eabc6255188de91218  # pragma: allowlist secret
  architecture: Qwen3ForCausalLM
release: "26.08"
precision: bf16
summary: Qwen3-8B support verification for conversion, inference, and training.
notes:
  training_verification: >
    Workload completion and the expected result are required; launch alone is
    insufficient. For ordered commands, wait for the preceding workload to
    finish successfully and verify its checkpoint before starting the next.
    Reference and resumed-output checkpoint directories must be distinct; the
    resumed-output directory must be new or empty, and the commit, H100
    topology, dataset, and configuration must match the reference run.
  training_metrics: >
    initial_loss is the lm loss at the first optimizer step and final_loss is
    the lm loss at the final optimizer step. The two last_half averages are the
    arithmetic means of the per-step console values over the latter half of the
    optimizer steps executed by that item. Skipped or NaN iterations invalidate
    verification rather than being excluded from the averages.
  dataset_policy: >
    RedPajama2 head_01 is a bounded Megatron-indexed prefix; command values omit
    .bin/.idx.
  enabled_features_allowlist:
    sequence_packing: [offline, in_batch]
    cuda_graph:
      implementation: [local, transformer_engine]
      scopes: [full_iteration, attn, mlp, moe, moe_router, moe_preprocess, mamba]
    context_parallel_size: "> 1"
    moe_dispatcher: [deepep, hybridep]

items:
  hf_to_megatron_cpu:
    status: verified
    command: >
      ./scripts/conversion/convert.sh import --executor local --device cpu
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/cpu-megatron
      --torch-dtype bfloat16
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      round-trips through CPU export with all 399 HF tensors matching the
      recorded HF revision exactly in keys, shapes, dtypes, and values.

  hf_to_megatron_gpu:
    status: verified
    command: >
      ./scripts/conversion/convert.sh import --executor local --device gpu
      --gpus-per-node 4
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/imported-megatron
      --torch-dtype bfloat16 --tp 4
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      reloads at TP=4 with weights exactly matching the recorded HF revision.

  megatron_to_hf_cpu:
    status: verified
    command: >
      ./scripts/conversion/convert.sh export --executor local --device cpu
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-8b/cpu-hf-export
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully; all 399 exported tensors match the
      recorded HF revision exactly, and the export reloads on CPU as
      Qwen3ForCausalLM.

  megatron_to_hf_gpu:
    status: verified
    command: >
      ./scripts/conversion/convert.sh export --executor local --device gpu
      --gpus-per-node 4
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-8b/hf-export --torch-dtype bfloat16
      --export-weight-dtype bfloat16 --distributed-save --tp 4
    last_verified: 2026-07-16
    expected_result: >
      Strict export exits successfully and the Hugging Face output reloads with
      AutoModelForCausalLM as Qwen3ForCausalLM.

  inference:
    status: verified
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      examples/conversion/hf_to_megatron_generate_text.py
      --hf_model_path Qwen/Qwen3-8B
      --megatron_model_path work/model-verification/qwen3-8b/imported-megatron/iter_0000000 --tp 4
      --prompt "The capital of France is" --max_new_tokens 32
    last_verified: 2026-07-16
    expected_result: >
      Two independent executions exit successfully after exactly 32 generation
      steps and print this byte-identical completion, including its leading space,
      " Paris. The capital of Italy is Rome. The capital of Spain is Madrid. The
      capital of Germany is Berlin. The capital of the Netherlands is Amsterdam. The".

  pretrain:
    status: verified
    gpu_type: H100
    enabled_features: {}
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      scripts/training/run_recipe.py
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset megatron-indexed --deterministic --seq_length 4096
      --max_steps 400 --global_batch_size 32 --micro_batch_size 2
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      dataset.data_path=work/model-verification/data/rp2/kenlm_perp_head_gopher_linefilter_decompressed/bin_idx/nemo/head_01_text_document
      dataset.path_to_cache=work/model-verification/qwen3-8b/rp2-index-cache-head01-seq4096-seed1234
      tokenizer.tokenizer_type=SentencePieceTokenizer
      tokenizer.tokenizer_model=work/model-verification/data/rp2/tokenizer/tokenizer.model
      rng.seed=1234 dataset.random_seed=1234
      scheduler.lr_decay_iters=400 validation.eval_iters=0 validation.eval_interval=0
      dist.distributed_timeout_minutes=30 checkpoint.load=null
      checkpoint.ckpt_format=torch_dist checkpoint.async_save=false
      checkpoint.save_optim=true checkpoint.save_rng=true
      --save_dir work/model-verification/qwen3-8b/pretrain-reference-checkpoints --save_interval 200
      logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 12.76213
      final_loss: 5.007709
      last_half_step_time_ms_avg: 4746.845
      last_half_model_tflops_per_gpu_avg: 338.553
    expected_result: >
      The uninterrupted RP2 run completes exactly 400 steps with finite losses,
      no skipped or NaN iterations, records all four metrics, and saves
      iter_0000200 and iter_0000400 for the resume-loss reference.

  sft:
    status: verified
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      scripts/training/run_recipe.py
      --recipe qwen3_8b_sft_4gpu_h100_bf16_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048 --global_batch_size 8 --micro_batch_size 1
      --lr 5e-6 --min_lr 0 --warmup_iters 10
      'dataset.hf_dataset.split="train[:10000]"'
      dataset.hf_output_root=work/model-verification/qwen3-8b/tulu3-train-10000
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
      checkpoint.save=null checkpoint.save_interval=0 logger.log_interval=1
      logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 1.546225
      final_loss: 1.127447
      last_half_step_time_ms_avg: 1901.584
      last_half_model_tflops_per_gpu_avg: 99.432
    expected_result: >
      Tulu3 offline packing completes and full SFT reaches step 100 with finite
      losses, no skipped or NaN iterations, and all four metrics recorded.

  sft_long_context:
    status: verified
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
      context_parallel_size: 2
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      scripts/training/run_recipe.py
      --recipe qwen3_8b_sft_4gpu_h100_bf16_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --max_steps 20 --seq_length 32768 --global_batch_size 1
      --micro_batch_size 1 --context_parallel_size 2
      --lr 1e-6 --min_lr 0 --warmup_iters 2
      'dataset.hf_dataset.split="train[:10000]"'
      dataset.hf_output_root=work/model-verification/qwen3-8b/tulu3-train-10000
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true
      model.sequence_parallel=true
      model.cp_comm_type=a2a model.cross_entropy_loss_fusion=false
      scheduler.lr_decay_iters=20 validation.eval_iters=0 validation.eval_interval=0
      checkpoint.load=null checkpoint.save=null checkpoint.save_interval=0
      logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 1.632253
      final_loss: 1.341897
      last_half_step_time_ms_avg: 8573.130
      last_half_model_tflops_per_gpu_avg: 35.860
    expected_result: >
      The 8-GPU command completes 20 Tulu3 SFT steps at sequence length 32768
      with CP=2 and offline packing, finite losses, no skipped or NaN iterations,
      and all four metrics recorded.

  peft:
    status: verified
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=1
      scripts/training/run_recipe.py
      --recipe qwen3_8b_peft_1gpu_h100_bf16_config --mode lora
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048 --global_batch_size 8 --micro_batch_size 1
      --lr 1e-4 --min_lr 0 --warmup_iters 10
      'dataset.hf_dataset.split="train[:10000]"'
      dataset.hf_output_root=work/model-verification/qwen3-8b/tulu3-train-10000
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
      checkpoint.async_save=false
      --save_dir work/model-verification/qwen3-8b/peft-checkpoints --save_interval 100
      logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 1.545473
      final_loss: 1.141865
      last_half_step_time_ms_avg: 2167.786
      last_half_model_tflops_per_gpu_avg: 347.862
    expected_result: >
      Tulu3 offline packing and 100 LoRA steps complete with finite losses, no
      skipped or NaN iterations, and all four metrics recorded, then
      iter_0000100 saves as an adapter checkpoint.

  checkpoint_resume:
    status: verified
    gpu_type: H100
    depends_on: pretrain
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      scripts/training/run_recipe.py
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset megatron-indexed --deterministic --seq_length 4096
      --max_steps 400 --global_batch_size 32 --micro_batch_size 2
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      dataset.data_path=work/model-verification/data/rp2/kenlm_perp_head_gopher_linefilter_decompressed/bin_idx/nemo/head_01_text_document
      dataset.path_to_cache=work/model-verification/qwen3-8b/rp2-index-cache-head01-seq4096-seed1234
      tokenizer.tokenizer_type=SentencePieceTokenizer
      tokenizer.tokenizer_model=work/model-verification/data/rp2/tokenizer/tokenizer.model
      rng.seed=1234 dataset.random_seed=1234
      scheduler.lr_decay_iters=400 validation.eval_iters=0 validation.eval_interval=0
      dist.distributed_timeout_minutes=30
      --load_dir work/model-verification/qwen3-8b/pretrain-reference-checkpoints
      --save_dir work/model-verification/qwen3-8b/pretrain-resumed-from-reference-checkpoints
      --save_interval 200 checkpoint.ckpt_step=200 checkpoint.finetune=false
      checkpoint.ckpt_format=torch_dist checkpoint.dist_ckpt_strictness=raise_all
      checkpoint.load_optim=true checkpoint.load_rng=true
      checkpoint.save_optim=true checkpoint.save_rng=true checkpoint.async_save=false
      train.exit_interval=null logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 5.663923
      final_loss: 5.007709
      last_half_step_time_ms_avg: 4766.228
      last_half_model_tflops_per_gpu_avg: 337.160
    resume_comparison:
      reference_item: pretrain
      sentinel_steps: [201, 400]
      loss_relative_tolerance: 1.0e-6
      loss_absolute_tolerance: 1.0e-6
      sentinels_match: true
    expected_result: >
      After pretrain has saved iter_0000200, the command loads that checkpoint
      directly from the reference directory without optimizer or RNG load
      errors, starts with step 201, and finishes at step 400 while saving to the
      distinct resumed-output directory. Consumed samples must be 6432 and
      12800 at steps 201 and 400; their learning rates and losses must match the
      uninterrupted run within the stated tolerances. All four resumed-segment
      metrics are recorded, with last-half averages over steps 301-400; exact
      printed sentinel matches are preferred.

  pretrain_performance:
    status: verified
    gpu_type: H100
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      scripts/training/run_recipe.py
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset mock --max_steps 100 --global_batch_size 32
      --micro_batch_size 2 --warmup_iters 10 scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
      checkpoint.save=null checkpoint.save_interval=0 logger.log_interval=1
      logger.log_throughput=true
    last_verified: 2026-07-16
    metrics:
      initial_loss: 12.74359
      final_loss: 0.01727812
      last_half_step_time_ms_avg: 4217.142
      last_half_model_tflops_per_gpu_avg: 381.016
    expected_result: >
      On one node with 4x H100, the mock-data run completes 100 steps with
      finite losses, no skipped or NaN iterations, records all four metrics,
      averages at most 4.5 seconds per step and at least 370 model TFLOP/s/GPU
      over steps 51-100, and stays below 65 GiB/GPU peak allocated memory.
