# Draft agent-readable model support card.
# status: unverified | verified | unsupported | not_applicable
# last_verified: YYYY-MM-DD or null
# verified requires an immutable hf_revision, a successful command, a concrete
# expected_result, and non-null last_verified.
# unverified may retain an older last_verified date when validation is stale.

title: qwen3_8b
model:
  hf_id: Qwen/Qwen3-8B
  hf_revision: b968826d9c46dd6066d109eabc6255188de91218  # pragma: allowlist secret
  architecture: Qwen3ForCausalLM
release: "26.08"
precision: bf16
summary: Placeholder card for reviewing the model support items and expected results.
notes:
  default_executor: slurm
  slurm_launcher_env: [SLURM_ACCOUNT, SLURM_PARTITION, CONTAINER_IMAGE]
  slurm_forwarded_env: [HF_HOME, HF_TOKEN]
  training_verification: >
    Slurm job completion and the expected result are required; submission alone
    is insufficient.
  enabled_features_allowlist:
    sequence_packing: [offline, in_batch]
    cuda_graph:
      implementation: [local, transformer_engine]
      scopes: [full_iteration, attn, mlp, moe, moe_router, moe_preprocess, mamba]
    context_parallel_size: "> 1"
    moe_dispatcher: [deepep, hybridep]

items:
  hf_to_megatron:
    status: unverified
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 4 --mount "$PWD:/opt/Megatron-Bridge"
      --mount /workspace --mount "$HF_HOME"
      --env HF_HOME --env HF_TOKEN --hf-model Qwen/Qwen3-8B
      --megatron-path /workspace/qwen3-8b/megatron --torch-dtype bfloat16 --tp 4
    last_verified: null
    expected_result: >
      The command exits successfully and creates a loadable Megatron checkpoint
      at /workspace/qwen3-8b/megatron/iter_0000000.

  megatron_to_hf:
    status: unverified
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 4 --mount "$PWD:/opt/Megatron-Bridge"
      --mount /workspace --mount "$HF_HOME"
      --env HF_HOME --env HF_TOKEN --hf-model Qwen/Qwen3-8B
      --megatron-path /workspace/qwen3-8b/megatron/iter_0000000
      --hf-path /workspace/qwen3-8b/hf-export --torch-dtype bfloat16 --tp 4
    last_verified: null
    expected_result: >
      The command exits successfully and /workspace/qwen3-8b/hf-export reloads
      as a Hugging Face checkpoint.

  inference:
    status: unverified
    command: >
      srun --mpi=pmix --no-kill --nodes=1 --ntasks=4 --gpus-per-task=1
      --account "$SLURM_ACCOUNT" --partition "$SLURM_PARTITION"
      --container-image "$CONTAINER_IMAGE"
      --container-mounts "$PWD:/opt/Megatron-Bridge,/workspace:/workspace,$HF_HOME:$HF_HOME"
      --export=HF_HOME,HF_TOKEN --no-container-mount-home bash -lc
      'cd /opt/Megatron-Bridge && uv run --no-sync python
      examples/conversion/hf_to_megatron_generate_text.py
      --hf_model_path Qwen/Qwen3-8B
      --megatron_model_path /workspace/qwen3-8b/megatron/iter_0000000 --tp 4
      --prompt "The capital of France is" --max_new_tokens 32'
    last_verified: null
    expected_result: >
      The generated continuation is non-empty and identifies Paris as the
      capital of France.

  pretrain:
    status: unverified
    enabled_features: {}
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset mock checkpoint.load=null
    last_verified: null
    expected_result: >
      qwen3_8b_pretrain_4gpu_h100_bf16_config runs for TBD steps and reaches
      loss TBD.

  sft:
    status: unverified
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_sft_4gpu_h100_bf16_config --mode sft
      --pretrained_checkpoint /workspace/qwen3-8b/megatron/iter_0000000
      checkpoint.load=null
    last_verified: null
    expected_result: >
      qwen3_8b_sft_4gpu_h100_bf16_config runs for TBD steps and reaches loss
      TBD.

  sft_long_context:
    status: verified
    enabled_features:
      sequence_packing: offline
      context_parallel_size: 2
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_sft_4gpu_h100_bf16_config --mode sft
      --pretrained_checkpoint /workspace/qwen3-8b/megatron/iter_0000000
      --max_steps 10 --seq_length 32768 --global_batch_size 1
      --micro_batch_size 1 --context_parallel_size 2
      --warmup_iters 1 dataset.enable_offline_packing=true
      model.sequence_parallel=true
      model.cp_comm_type=a2a model.cross_entropy_loss_fusion=false
      scheduler.lr_decay_iters=10 validation.eval_iters=0 validation.eval_interval=0
      checkpoint.load=null checkpoint.save=null checkpoint.save_interval=0
      logger.log_interval=1
    last_verified: 2026-07-16
    expected_result: >
      The 8-GPU command completes 10 SFT steps at a sequence length of 32768
      and reports a finite training loss at step 10.

  peft:
    status: unverified
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 1
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_peft_1gpu_h100_bf16_config --mode lora
      --pretrained_checkpoint /workspace/qwen3-8b/megatron/iter_0000000
      checkpoint.load=null
    last_verified: null
    expected_result: >
      qwen3_8b_peft_1gpu_h100_bf16_config completes and saves a LoRA adapter
      checkpoint.

  checkpoint_resume:
    status: unverified
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset mock --max_steps 51
      --save_dir /workspace/qwen3-8b/resume-checkpoints
      --load_dir /workspace/qwen3-8b/resume-checkpoints
      checkpoint.ckpt_step=50
    last_verified: null
    expected_result: >
      Given a checkpoint at step 50, training resumes from it and completes
      step 51 without restarting from step 0.

  pretrain_convergence:
    status: unverified
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset mock checkpoint.load=null
    last_verified: null
    expected_result: >
      qwen3_8b_pretrain_4gpu_h100_bf16_config reaches loss TBD by step TBD.

  pretrain_performance:
    status: unverified
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --mount "$PWD:/opt/Megatron-Bridge" --mount /workspace
      --mount "$HF_HOME" --env HF_HOME --env HF_TOKEN
      --recipe qwen3_8b_pretrain_4gpu_h100_bf16_config --mode pretrain
      --dataset mock --max_steps 100 checkpoint.load=null
    last_verified: null
    expected_result: >
      qwen3_8b_pretrain_4gpu_h100_bf16_config reaches throughput TBD and peak
      memory TBD on 4x H100 with topology TBD.
