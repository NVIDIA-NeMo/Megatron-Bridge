# Agent-readable model support card.
# status: unverified | verified | unsupported | not_applicable

title: moonlight_16b_a3b
model:
  hf_id: moonshotai/Moonlight-16B-A3B
  hf_revision: 476b36a473d4467f94469414bef6cee75c9c8172  # pragma: allowlist secret
  architecture: DeepseekV3ForCausalLM
  min_transformers_version: "5.8.1"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: 93c6930597fd3766acd177288b7a8607d7b96ad7  # pragma: allowlist secret
summary: Moonlight-16B-A3B support verification for conversion, inference, and training.

items:
  hf_to_megatron_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/cpu-megatron
      --torch-dtype bfloat16 --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      round-trips through CPU export with exact model configuration. After
      native reload, all 377 registered parameters and persistent buffers match
      bitwise by key, shape, dtype, and value. In the serialized files, 26 router
      correction-bias buffers widen losslessly from BF16 to FP32.

  hf_to_megatron_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/imported-megatron
      --torch-dtype bfloat16 --tp 1 --pp 1 --ep 8 --etp 1
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, creates a reloadable iter_0000000, and
      an exact audit finds all 5,344 serialized source tensors and the model
      configuration unchanged after the paired GPU export.

  megatron_to_hf_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/moonlight-16b-a3b/cpu-hf-export
      --torch-dtype bfloat16 --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, the model configuration is exact, and all
      377 registered parameters and persistent buffers match bitwise by key,
      shape, dtype, and value after native reload. Transformers strictly reloads
      the output as DeepseekV3ForCausalLM with trust_remote_code disabled. In the
      serialized files, 26 router correction-bias buffers widen losslessly from
      BF16 to FP32 and 27 stale, nonpersistent source inv_freq tensors are
      omitted.

  megatron_to_hf_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --hf-path work/model-verification/moonlight-16b-a3b/hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 1 --pp 1 --ep 8 --etp 1
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Strict distributed export exits successfully, all 5,344 serialized tensor
      keys, shapes, dtypes, and values match the recorded HF revision, and native
      Transformers strictly reloads the output as DeepseekV3ForCausalLM with
      trust_remote_code disabled and no missing or unexpected keys.

  manual_forward_pass:
    status: verified
    precision: bf16
    bridge_commit: 056616080f2d8202bfe3f636069584406b5e465e  # pragma: allowlist secret
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/compare_hf_and_megatron/compare.py
      --hf_model_path moonshotai/Moonlight-16B-A3B
      --megatron_model_path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --tp 1 --pp 1 --ep 8 --etp 1
      --prompt "The capital of France is"
      --model_class DeepseekV3ForCausalLM --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Hugging Face and Megatron have next-token matches at token ID 17374
      (" Paris"). Cosine similarity is 0.999893, above the 0.9998 gate; the
      maximum absolute logit difference is 0.472656 and the mean absolute logit
      difference is 0.074414.

  inference:
    status: verified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/hf_to_megatron_generate_text.py
      --hf_model_path moonshotai/Moonlight-16B-A3B
      --megatron_model_path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --tp 1 --pp 1 --ep 8 --etp 1
      --prompt "The capital of France is" --max_new_tokens 32
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Two independent executions using greedy decoding each produce exactly 32
      new tokens with byte-identical token IDs and this literal completion,
      including its leading space, " Paris. It is the largest city in France
      and is known for its iconic landmarks such as the Eiffel Tower, the
      Louvre Museum, and Notre-Dame".

  pretrain:
    status: verified
    precision: bf16
    gpu_type: H100
    enabled_features: {}
    command: >
      ./scripts/training/train.sh --nodes 8 --gpus-per-node 8
      --recipe moonlight_16b_pretrain_8gpu_h100_bf16_config
      --dataset megatron-indexed --seq_length 4096 --max_steps 400
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      dataset.data_path=work/data/rp2/head_01
      dataset.path_to_cache=work/cache/moonlight-16b-a3b/rp2
      scheduler.lr_decay_iters=400
      validation.eval_iters=0 validation.eval_interval=0
      dist.distributed_timeout_minutes=30
      --save_dir work/model-verification/moonlight-16b-a3b/pretrain-reference-checkpoints
      --save_interval 200 logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-19
    metrics:
      initial_loss: 12.41085
      final_loss: 3.413953
      last_10_steps_step_time_ms_avg: 25895.910
      last_10_steps_model_tflops_per_gpu_avg: 86.840
    expected_result: >
      The unchanged recipe batch completes exactly 400 bounded RP2 optimizer
      steps with finite loss 12.41085 at step 1 and 3.413953 at step 400, no
      skipped or NaN iterations, the recorded final-ten metrics, and complete
      iter_0000200 and iter_0000400 checkpoints.

  sft:
    status: verified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
      --recipe moonlight_16b_sft_8gpu_h100_bf16_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048
      --lr 5e-6 --min_lr 0 --warmup_iters 10
      "dataset.hf_dataset.split='train[:10000]'"
      dataset.hf_output_root=work/data/tulu3
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0
      --save_dir work/model-verification/moonlight-16b-a3b/sft-checkpoints
      --save_interval 100 logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-19
    metrics:
      initial_loss: 1.280769
      final_loss: 1.162448
      last_10_steps_step_time_ms_avg: 16743.000
      last_10_steps_model_tflops_per_gpu_avg: 30.820
    expected_result: >
      Tulu3 offline packing completes exactly 100 full-SFT steps with finite
      loss 1.280769 at step 1 and 1.162448 at step 100, no skipped or NaN
      iterations, the recorded final-ten metrics, and a complete full-model
      iter_0000100 checkpoint.

  sft_export_inference:
    status: verified
    precision: bf16
    depends_on: sft
    commands:
      - >
        ./scripts/conversion/convert.sh export --executor slurm --device cpu
        --nodes 1
        --hf-model moonshotai/Moonlight-16B-A3B
        --megatron-path work/model-verification/moonlight-16b-a3b/sft-checkpoints/iter_0000100
        --hf-path work/model-verification/moonlight-16b-a3b/sft-hf-export
        --torch-dtype bfloat16 --trust-remote-code
      - >
        uv run python
        skills/create-model-verification-card/scripts/verify_hf_inference.py
        --hf-model work/model-verification/moonlight-16b-a3b/sft-hf-export
        --prompt "In one short sentence, explain why Paris is important to France."
        --max-new-tokens 32 --chat-template
    last_verified: 2026-07-19
    expected_result: >
      The step-100 SFT checkpoint exports with its checkpoint-configured
      163842-row embedding and output head, natively reloads with
      trust_remote_code disabled and no missing or unexpected keys. Two
      independent runs using greedy generation each produce exactly 32 new
      tokens with identical token IDs and this coherent, byte-identical literal
      completion, including whitespace,
      "Paris is the capital city of France and is considered the cultural,
      political, and economic center of the country. It is home to many of
      France's most famous".

  sft_long_context:
    status: verified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
      context_parallel_size: 2
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
      --recipe moonlight_16b_sft_8gpu_h100_bf16_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 20 --seq_length 8192 --context_parallel_size 2
      --lr 1e-6 --min_lr 0 --warmup_iters 2
      "dataset.hf_dataset.split='train[:10000]'"
      dataset.hf_output_root=work/data/tulu3-long-context
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true scheduler.lr_decay_iters=20
      validation.eval_iters=0 validation.eval_interval=0
      logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-19
    metrics:
      initial_loss: 1.264452
      final_loss: 1.251715
      last_10_steps_step_time_ms_avg: 59637.250
      last_10_steps_model_tflops_per_gpu_avg: 41.490
    expected_result: >
      The command completes exactly 20 Tulu3 SFT steps at the model's 8192-token
      context limit with CP=2 and 99.69%-efficient offline packing, finite loss
      1.264452 at step 1 and 1.251715 at step 20, no skipped or NaN iterations,
      and the recorded final-ten metrics.

  peft:
    status: verified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 2
      --recipe moonlight_16b_peft_2gpu_h100_bf16_config --mode lora
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048
      --lr 1e-4 --min_lr 0 --warmup_iters 10
      "dataset.hf_dataset.split='train[:10000]'"
      dataset.hf_output_root=work/data/tulu3-lora
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0
      --save_dir work/model-verification/moonlight-16b-a3b/peft-checkpoints
      --save_interval 100 logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-19
    metrics:
      initial_loss: 1.247692
      final_loss: 1.115713
      last_10_steps_step_time_ms_avg: 36894.370
      last_10_steps_model_tflops_per_gpu_avg: 55.820
    expected_result: >
      Tulu3 offline packing completes exactly 100 LoRA steps with finite loss
      1.247692 at step 1 and 1.115713 at step 100, no skipped or NaN
      iterations, the recorded final-ten metrics, and a complete iter_0000100
      adapter checkpoint.

  checkpoint_resume:
    status: verified
    precision: bf16
    gpu_type: H100
    depends_on: pretrain
    command: >
      ./scripts/training/train.sh --nodes 8 --gpus-per-node 8
      --recipe moonlight_16b_pretrain_8gpu_h100_bf16_config
      --dataset megatron-indexed --seq_length 4096 --max_steps 400
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      dataset.data_path=work/data/rp2/head_01
      dataset.path_to_cache=work/cache/moonlight-16b-a3b/rp2
      scheduler.lr_decay_iters=400
      validation.eval_iters=0 validation.eval_interval=0
      dist.distributed_timeout_minutes=30
      --load_dir work/model-verification/moonlight-16b-a3b/pretrain-reference-checkpoints
      --save_dir work/model-verification/moonlight-16b-a3b/pretrain-resumed-checkpoints
      --save_interval 200 checkpoint.ckpt_step=200
      logger.log_interval=1 logger.log_throughput=true
    last_verified: 2026-07-19
    metrics:
      initial_loss: 4.104850
      final_loss: 3.413714
      last_10_steps_step_time_ms_avg: 25707.450
      last_10_steps_model_tflops_per_gpu_avg: 87.470
    resume_comparison:
      reference_item: pretrain
      sentinel_steps: [201, 400]
      loss_relative_tolerance: 1.0e-2
      loss_absolute_tolerance: 1.0e-6
      sentinels_match: true
    expected_result: >
      The command restores optimizer and RNG state directly from iter_0000200,
      executes exactly steps 201–400 with finite losses and no skipped or NaN
      iterations, and saves a complete iter_0000400 in the distinct output
      root. Step-201 loss 4.104850 exactly matches the reference; step-400 loss
      3.413714 differs from reference 3.413953 by 0.007001%, within the
      one-percent gate. The recorded final-ten metrics cover steps 391–400.
