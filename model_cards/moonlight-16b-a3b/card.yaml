# Agent-readable model support card.
# status: unverified | verified | unsupported | not_applicable

title: moonlight_16b_a3b
model:
  hf_id: moonshotai/Moonlight-16B-A3B
  hf_revision: 476b36a473d4467f94469414bef6cee75c9c8172  # pragma: allowlist secret
  architecture: DeepseekV3ForCausalLM
  min_transformers_version: "5.8.1"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: 93c6930597fd3766acd177288b7a8607d7b96ad7  # pragma: allowlist secret
summary: Moonlight-16B-A3B support verification for conversion, inference, and training.

items:
  hf_to_megatron_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/cpu-megatron
      --torch-dtype bfloat16 --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      round-trips through CPU export with exact model configuration. After
      native reload, all 377 registered parameters and persistent buffers match
      bitwise by key, shape, dtype, and value. In the serialized files, 26 router
      correction-bias buffers widen losslessly from BF16 to FP32.

  hf_to_megatron_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/imported-megatron
      --torch-dtype bfloat16 --tp 1 --pp 1 --ep 8 --etp 1
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, creates a reloadable iter_0000000, and
      an exact audit finds all 5,344 serialized source tensors and the model
      configuration unchanged after the paired GPU export.

  megatron_to_hf_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/moonlight-16b-a3b/cpu-hf-export
      --torch-dtype bfloat16 --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      The command exits successfully, the model configuration is exact, and all
      377 registered parameters and persistent buffers match bitwise by key,
      shape, dtype, and value after native reload. Transformers strictly reloads
      the output as DeepseekV3ForCausalLM with trust_remote_code disabled. In the
      serialized files, 26 router correction-bias buffers widen losslessly from
      BF16 to FP32 and 27 stale, nonpersistent source inv_freq tensors are
      omitted.

  megatron_to_hf_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model moonshotai/Moonlight-16B-A3B
      --megatron-path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --hf-path work/model-verification/moonlight-16b-a3b/hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 1 --pp 1 --ep 8 --etp 1
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Strict distributed export exits successfully, all 5,344 serialized tensor
      keys, shapes, dtypes, and values match the recorded HF revision, and native
      Transformers strictly reloads the output as DeepseekV3ForCausalLM with
      trust_remote_code disabled and no missing or unexpected keys.

  manual_forward_pass:
    status: verified
    precision: bf16
    bridge_commit: 056616080f2d8202bfe3f636069584406b5e465e  # pragma: allowlist secret
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/compare_hf_and_megatron/compare.py
      --hf_model_path moonshotai/Moonlight-16B-A3B
      --megatron_model_path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --tp 1 --pp 1 --ep 8 --etp 1
      --prompt "The capital of France is"
      --model_class DeepseekV3ForCausalLM --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Hugging Face and Megatron have next-token matches at token ID 17374
      (" Paris"). Cosine similarity is 0.999893, above the 0.99 correlation
      gate. The maximum absolute logit difference is 0.472656 and the mean
      absolute logit difference is 0.074414; both are report-only diagnostic
      observations. This historical result predates explicit helper revision
      pinning and is retained against the recorded immutable HF revision.

  inference:
    status: verified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/hf_to_megatron_generate_text.py
      --hf_model_path moonshotai/Moonlight-16B-A3B
      --megatron_model_path work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --tp 1 --pp 1 --ep 8 --etp 1
      --prompt "The capital of France is" --max_new_tokens 32
      --trust-remote-code
    last_verified: 2026-07-19
    expected_result: >
      Two independent executions using greedy decoding each produce exactly 32
      new tokens with byte-identical token IDs and this literal completion,
      including its leading space, " Paris. It is the largest city in France
      and is known for its iconic landmarks such as the Eiffel Tower, the
      Louvre Museum, and Notre-Dame".

  pretrain:
    status: unverified
    precision: bf16
    gpu_type: H100
    enabled_features: {}
    command: >
      ./scripts/training/train.sh --nodes 2 --gpus-per-node 8
      --recipe moonlight_16b_pretrain_16gpu_h100_bf16_config --mode pretrain
      --dataset megatron-indexed --seq_length 4096 --max_steps 100
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      'dataset.blend=[["work/data/rp2/head_01"],null]'
      dataset.path_to_cache=work/cache/moonlight-16b-a3b/rp2-convergence-v1
      tokenizer.tokenizer_type=SentencePieceTokenizer
      tokenizer.tokenizer_model=work/data/rp2/tokenizer.model
      dataset.random_seed=1234 rng.seed=1234 scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0
      ddp.check_for_nan_in_grad=true ddp.check_for_large_grads=true
      rerun_state_machine.check_for_nan_in_loss=true checkpoint.load=null
      dist.distributed_timeout_minutes=30
      --save_dir work/model-verification/moonlight-16b-a3b/pretrain-convergence-v1-reference-checkpoints
      --save_interval 50 logger.log_interval=1 logger.log_throughput=true
      logger.tensorboard_dir=null
    last_verified: null
    metrics:
      initial_loss: null
      final_loss: null
      last_10_steps_step_time_ms_avg: null
      last_10_steps_model_tflops_per_gpu_avg: null
    expected_result: >
      The pending uninterrupted 16-GPU bounded RP2 reference must complete
      exactly 100 steps at recipe-owned GBS/MBS 1024/1 with finite losses and
      no skipped or NaN iterations. It must reach peak learning rate at step
      40, complete cosine decay at step 100, and save complete iter_0000050 and
      iter_0000100 checkpoints before this cohort item can be marked verified.

  sft:
    status: unverified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
      --recipe moonlight_16b_sft_8gpu_h100_bf16_tp1_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048
      --lr 5e-6 --min_lr 0 --warmup_iters 10
      'dataset.hf_dataset.split="train[:10000]"'
      'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
      '++tokenizer.hf_tokenizer_kwargs.revision="476b36a473d4467f94469414bef6cee75c9c8172"'
      dataset.hf_output_root=work/data/tulu3/moonlight-16b-a3b-sft-b14afda60f1b
      dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true
      +dataset.offline_packing_specs.pad_seq_to_mult=1 scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
      --save_dir work/model-verification/moonlight-16b-a3b/sft-convergence-v1-checkpoints
      --save_interval 100 logger.log_interval=1 logger.log_throughput=true
    last_verified: null
    metrics:
      initial_loss: null
      final_loss: null
      last_10_steps_step_time_ms_avg: null
      last_10_steps_model_tflops_per_gpu_avg: null
    expected_result: >
      The pending TP1/PP1/EP8 run must preserve recipe-owned GBS/MBS 32/1 and
      pad-1 offline packing, complete exactly 100 full-SFT steps with finite
      losses and no skipped or NaN iterations, and save a complete full-model
      iter_0000100 checkpoint. Packing efficiency and the actual supervised-
      token count after label masking must be recorded before verification.

  sft_export_inference:
    status: unverified
    precision: bf16
    depends_on: sft
    commands:
      - >
        ./scripts/conversion/convert.sh export --executor slurm --device gpu
        --nodes 1 --gpus-per-node 8
        --hf-model moonshotai/Moonlight-16B-A3B
        --megatron-path work/model-verification/moonlight-16b-a3b/sft-convergence-v1-checkpoints/iter_0000100
        --hf-path work/model-verification/moonlight-16b-a3b/sft-convergence-v1-hf-export
        --torch-dtype bfloat16 --export-weight-dtype bfloat16
        --distributed-save --tp 1 --pp 1 --ep 8 --etp 1 --trust-remote-code
      - >
        uv run python
        skills/create-model-verification-card/scripts/verify_hf_inference.py
        --hf-model work/model-verification/moonlight-16b-a3b/sft-convergence-v1-hf-export
        --prompt "In one short sentence, explain why Paris is important to France."
        --max-new-tokens 32 --chat-template
    last_verified: null
    expected_result: >
      After the pending SFT run passes, its step-100 checkpoint must export with
      a 163842-row embedding and output head, all index-referenced BF16 shards
      must reload natively with no missing or unexpected keys, and the helper
      must produce exactly 32 new tokens twice with identical token IDs. The
      byte-identical literal completion must be recorded before verification.

  sft_long_context:
    status: unverified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
      context_parallel_size: 2
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
      --recipe moonlight_16b_sft_8k_config --mode sft
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 20 --seq_length 8192 --context_parallel_size 2
      --lr 1e-6 --min_lr 0 --warmup_iters 2
      'dataset.hf_dataset.split="train[:10000]"'
      'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
      '++tokenizer.hf_tokenizer_kwargs.revision="476b36a473d4467f94469414bef6cee75c9c8172"'
      dataset.hf_output_root=work/data/tulu3/moonlight-16b-a3b-long-context-b14afda60f1b
      dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true
      +dataset.offline_packing_specs.pad_seq_to_mult=4 scheduler.lr_decay_iters=20
      validation.eval_iters=0 validation.eval_interval=0
      checkpoint.load=null checkpoint.save=null
      logger.log_interval=1 logger.log_throughput=true
    last_verified: null
    metrics:
      initial_loss: null
      final_loss: null
      last_10_steps_step_time_ms_avg: null
      last_10_steps_model_tflops_per_gpu_avg: null
    expected_result: >
      A fresh immutable-revision run must complete exactly 20 Tulu3 SFT steps
      at the model's 8192-token context limit with recipe-owned
      TP2/PP1/CP2/EP8/SP-on, GBS/MBS 128/1, and explicit pad-4 offline packing.
      Losses must remain finite with no skipped or NaN iterations, and all four
      metrics must be recorded before this item can be verified.

  peft:
    status: unverified
    precision: bf16
    gpu_type: H100
    enabled_features:
      sequence_packing: offline
    command: >
      ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
      --recipe moonlight_16b_peft_4gpu_h100_bf16_config --mode lora
      --dataset tulu3
      --pretrained_checkpoint work/model-verification/moonlight-16b-a3b/imported-megatron/iter_0000000
      --max_steps 100 --seq_length 2048
      --lr 1e-4 --min_lr 0 --warmup_iters 10
      'dataset.hf_dataset.split="train[:10000]"'
      'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
      '++tokenizer.hf_tokenizer_kwargs.revision="476b36a473d4467f94469414bef6cee75c9c8172"'
      dataset.hf_output_root=work/data/tulu3/moonlight-16b-a3b-peft-b14afda60f1b
      dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
      dataset.do_validation=false dataset.hf_validation_proportion=null
      dataset.enable_offline_packing=true
      +dataset.offline_packing_specs.pad_seq_to_mult=4 scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
      --save_dir work/model-verification/moonlight-16b-a3b/peft-convergence-v1-checkpoints
      --save_interval 100 logger.log_interval=1 logger.log_throughput=true
    last_verified: null
    metrics:
      initial_loss: null
      final_loss: null
      last_10_steps_step_time_ms_avg: null
      last_10_steps_model_tflops_per_gpu_avg: null
    expected_result: >
      The pending TP4/PP1/EP4 run must preserve recipe-owned GBS/MBS 32/1 and
      pad-4 offline packing, train only rank-8, alpha-16, zero-dropout LoRA on
      Moonlight's model-native attention projections, and complete exactly 100
      steps with finite losses and no skipped or NaN iterations. Packing
      efficiency, actual supervised-token count, and a complete iter_0000100
      adapter checkpoint must be recorded before verification.

  checkpoint_resume:
    status: unverified
    precision: bf16
    gpu_type: H100
    depends_on: pretrain
    command: >
      ./scripts/training/train.sh --nodes 2 --gpus-per-node 8
      --recipe moonlight_16b_pretrain_16gpu_h100_bf16_config --mode pretrain
      --dataset megatron-indexed --seq_length 4096 --max_steps 100
      --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
      'dataset.blend=[["work/data/rp2/head_01"],null]'
      dataset.path_to_cache=work/cache/moonlight-16b-a3b/rp2-convergence-v1
      tokenizer.tokenizer_type=SentencePieceTokenizer
      tokenizer.tokenizer_model=work/data/rp2/tokenizer.model
      dataset.random_seed=1234 rng.seed=1234 scheduler.lr_decay_iters=100
      validation.eval_iters=0 validation.eval_interval=0
      ddp.check_for_nan_in_grad=true ddp.check_for_large_grads=true
      rerun_state_machine.check_for_nan_in_loss=true
      dist.distributed_timeout_minutes=30
      --load_dir work/model-verification/moonlight-16b-a3b/pretrain-convergence-v1-reference-checkpoints
      --save_dir work/model-verification/moonlight-16b-a3b/pretrain-convergence-v1-resumed-checkpoints
      --save_interval 50 checkpoint.ckpt_step=50
      logger.log_interval=1 logger.log_throughput=true logger.tensorboard_dir=null
    last_verified: null
    metrics:
      initial_loss: null
      final_loss: null
      last_10_steps_step_time_ms_avg: null
      last_10_steps_model_tflops_per_gpu_avg: null
    resume_comparison:
      reference_item: pretrain
      sentinel_steps: [51, 100]
      loss_relative_tolerance: 1.0e-2
      loss_absolute_tolerance: 1.0e-6
      sentinels_match: null
    expected_result: >
      After the pending uninterrupted reference completes, this command must
      restore optimizer, scheduler, data-order, and RNG state directly from
      iter_0000050, begin at step 51, and finish at step 100 in the distinct
      resumed output root. Step-51 and step-100 loss must satisfy the declared
      absolute-plus-relative tolerance against the reference, with finite
      losses and no skipped or NaN iterations.
