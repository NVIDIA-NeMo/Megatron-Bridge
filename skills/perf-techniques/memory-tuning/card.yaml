title: memory_tuning
validated_on: "2026-04-02"
summary: >
  Techniques for reducing peak GPU memory to fix OOM or increase headroom.
  Current coverage: VPP tuning, parallelism resizing, CPU offloading
  constraints. Measured on Llama3 70B SFT (32x H100, FP8 CS): doubling
  VPP from 5 to 10 reduced layers per chunk from 4 to 2 and eliminated
  OOM with only -1.6% GPU utilization. By contrast, doubling PP (4→8)
  cost ~6% and halved DP, while doubling TP (4→8) caused -28% regression.
  CPU offloading is blocked when PP > 1. VPP tuning is the recommended
  first response to borderline OOM when PP is already in use.
validation_status:
  vpp_config_validation:
    - code_verified  # MCore transformer_config.py
  vpp_layers_per_chunk_formula:
    - code_verified  # num_layers / (PP * VPP)
  llama3_70b_sft_fp8_cs_experiment:
    - measured  # PR #3107, 32x H100, TP4 PP4 DP2
training_dimensions:
  speed:
    effect: "~1-2% slower (VPP 5→10 on Llama3 70B)"
    confidence: high
    rationale: >
      Measured on Llama3 70B SFT 32x H100: VPP=10 achieved 698.9 TFLOP/s/GPU
      vs 709.93 golden (-1.6%). Higher VPP increases inter-stage P2P
      communication but reduces pipeline bubble fraction.
  memory:
    effect: "eliminates borderline OOM by halving layers-in-flight per chunk"
    confidence: high
    rationale: >
      VPP=10 changed layers per chunk from 4 to 2, reducing peak activation
      memory enough to eliminate the OOM at 58.8 GB. Peak with VPP=10 was
      60.2 GB without OOM because the activation peak shifted off the
      problematic rank.
  scale:
    effect: "neutral"
    confidence: medium
    rationale: >
      VPP does not change TP, PP, or DP. It only changes the interleaved
      pipeline schedule granularity.
  convergence:
    effect: "no change expected"
    confidence: high
    rationale: >
      VPP changes the pipeline schedule but not the computation or numerics.
  stability:
    effect: "neutral"
    confidence: high
    rationale: >
      Fewer layers per chunk means less memory pressure per micro-batch,
      reducing OOM risk.
enable_when:
  - training OOMs or is close to the GPU memory limit
  - pipeline parallelism (PP > 1) is already in use
  - num_layers is divisible by PP * VPP
  - throughput regression from recompute (mlp) is too expensive
  - TP or PP increases would eliminate data parallelism
avoid_when:
  - PP = 1 (VPP requires PP > 1)
  - num_layers is not cleanly divisible by PP * desired_VPP
  - VPP is already very high and further increases add too much P2P comm
  - the global batch has very few micro-batches (large VPP worsens bubble ratio)
interactions:
  required:
    - pipeline_model_parallel_size > 1
  conditional:
    - num_layers must be divisible by PP * VPP (per middle PP stage)
    - account_for_embedding_in_pipeline_split and account_for_loss_in_pipeline_split interact with VPP layer divisibility checks
    - DP communication overlap effectiveness improves with more VPP chunks
  incompatible: []
feature_meaning:
  virtual_pipeline_model_parallel_size: >
    Number of virtual pipeline chunks per PP stage. Each chunk processes
    (num_layers / PP / VPP) transformer layers. Higher VPP means smaller
    chunks, less peak activation memory per chunk, but more inter-stage
    communication round-trips.
config_keys:
  - model.virtual_pipeline_model_parallel_size
  - model.pipeline_model_parallel_size
  - model.num_layers
recommended_path:
  formula: "layers_per_chunk = num_layers / (PP * VPP)"
  target: "2-4 layers per chunk for memory-constrained workloads"
  first_try: "double VPP (e.g. 5→10) to halve layers per chunk"
  check: "num_layers % (PP * VPP) == 0"
expected_metric_change:
  - metric: peak_memory
    direction: down
    magnitude: "proportional to layers_per_chunk reduction"
    conditions: PP > 1, Llama3 70B SFT, 32x H100
    evidence: measured_pr_3107
  - metric: gpu_utilization
    direction: down
    magnitude: "~1-2% for VPP 5→10"
    conditions: Llama3 70B SFT, TP4 PP4 DP2, 32x H100
    evidence: measured_pr_3107
measured_results:
  - model: Llama3 70B
    task: sft
    precision: FP8_CS
    gpus: 32
    gpu: H100_80GB
    seq_length: 4096
    mbs: 1
    gbs: 32
    golden_tflops: 709.93
    regression_threshold_pct: 5
    experiments:
      - name: baseline
        tp: 4
        pp: 4
        vpp: 5
        dp: 2
        layers_per_chunk: 4
        tflops: 704
        vs_golden_pct: -0.8
        peak_mem_gb: 58.8
        status: OOM
      - name: more_pp
        tp: 4
        pp: 8
        vpp: 5
        dp: 1
        layers_per_chunk: 2
        tflops: 668.0
        vs_golden_pct: -5.9
        peak_mem_gb: 53.2
        status: passed_mem_borderline_perf
        note: "halved DP (2→1) means 32 gradient accumulation steps"
      - name: more_tp
        tp: 8
        pp: 4
        vpp: 5
        dp: 1
        layers_per_chunk: 4
        tflops: 508.7
        vs_golden_pct: -28.4
        peak_mem_gb: 50.2
        status: severe_perf_regression
        note: "doubling TP increases all-reduce comm volume, DP=1 means no micro-batch overlap"
      - name: more_vpp
        tp: 4
        pp: 4
        vpp: 10
        dp: 2
        layers_per_chunk: 2
        tflops: 698.9
        vs_golden_pct: -1.6
        peak_mem_gb: 60.2
        status: passed
        note: "winner — minimal perf impact, no OOM, preserves DP"
  - name: cpu_offloading_blocked
    note: >
      CPU activation offloading (cpu_offloading=True) was tested as an
      alternative but is incompatible with PP > 1. All experiments raised
      ValueError. This approach is blocked for any model using PP > 1.
failure_modes:
  - name: vpp_not_divisible
    symptom: "ValueError: number of layers on each pipeline rank must be divisible by VPP"
    likely_cause: num_layers / PP is not divisible by desired VPP
    fix: choose a VPP value that divides (num_layers / PP) evenly
  - name: vpp_too_high_comm_overhead
    symptom: throughput regression exceeding budget
    likely_cause: too many virtual chunks cause excessive P2P comm
    fix: reduce VPP or increase GBS to amortize bubble
  - name: pp_increase_loses_dp
    symptom: throughput drop despite lower memory
    likely_cause: increasing PP reduces DP, increasing gradient accumulation steps
    fix: use VPP increase instead to preserve DP
known_constraints:
  - requires pipeline_model_parallel_size > 1
  - num_layers must be divisible by PP * VPP on each pipeline stage
  - account_for_embedding_in_pipeline_split and account_for_loss_in_pipeline_split add layer count adjustments that must still be divisible by VPP
  - very high VPP with few micro-batches per global batch can worsen the bubble ratio
known_limitations:
  - VPP tuning requires that the layer count is cleanly divisible; not all model architectures allow arbitrary VPP values
  - the memory reduction from VPP is indirect (fewer layers in-flight), not a fixed GB savings
  - optimal VPP depends on the specific model, parallelism, and batch configuration
evidence:
  - docs/parallelisms.md
  - docs/performance-guide.md
  - "PR #3107 (Llama3 70B SFT OOM fix experiment)"
  - scripts/performance/configs/llama/llama3_workload_base_configs.py
  - 3rdparty/Megatron-LM/megatron/core/transformer/transformer_config.py
follow_up_validation:
  - Measure VPP impact on MoE models where PP is typically high.
  - Test VPP=20 on Llama3 70B to establish the diminishing-returns curve.
  - Measure VPP interaction with DP communication overlap alignment.
