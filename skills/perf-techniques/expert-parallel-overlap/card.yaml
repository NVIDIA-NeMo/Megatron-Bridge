title: expert_parallel_overlap
validated_on: "2026-03-22"
summary: >
  MoE expert-parallel overlap hides token dispatch or combine communication
  behind expert compute through `overlap_moe_expert_parallel_comm`, with
  optional delayed expert wgrad scheduling via `delay_wgrad_compute`. Repo
  evidence currently supports correctness and activation, but not a general
  throughput win: Qwen3-30B-A3B with EP=4 and `alltoall` is flat at GBS=8 and
  ~13% slower at GBS=64, while Qwen3-Next-80B-A3B with EP=8 has stable overlap
  variants but `delay_wgrad_compute` is still ~4.8% slower than overlap-only.
validation_status:
  unit_tests:
    - code_verified
  flex_dispatcher_helper:
    - code_verified
  qwen3_30b_a3b_ep4_alltoall:
    - measured
  qwen3_next_80b_a3b_ep8_alltoall:
    - measured
training_dimensions:
  speed:
    effect: "0/-"
    confidence: high
    rationale: >
      Measured runs show no gain at EP=4 with `alltoall` and regressions from
      scheduling overhead. Benefit is still expected only when expert-parallel
      communication is a dominant bottleneck.
  memory:
    effect: "0"
    confidence: medium
    rationale: >
      Current experiments did not show a meaningful memory change attributable
      to the overlap feature itself.
  scale:
    effect: "+"
    confidence: medium
    rationale: >
      The technique becomes more relevant as EP size, inter-node traffic, and
      dispatcher latency grow.
  convergence:
    effect: "0"
    confidence: medium
    rationale: >
      Qwen3-30B-A3B loss matches within 0.001 at GBS=8. Larger GBS can change
      accumulation ordering and lead to different trajectories without implying
      a correctness bug.
  stability:
    effect: "+/-"
    confidence: medium
    rationale: >
      Overlap variants were stable in the measured runs, but the feature adds
      strict constraints around recompute, VPP, shared-expert overlap, runtime
      versions, and some CUDA-graph combinations.
enable_when:
  - EP is large enough that expert-parallel communication is visible in the profile.
  - The run has many micro-batches, so there is real overlap opportunity.
  - Inter-node A2A latency is meaningful, especially with `flex` backends.
  - Baseline correctness is already established without EP overlap.
avoid_when:
  - EP <= 4 with `alltoall` on <= 2 nodes.
  - The run is still in basic bring-up or correctness debugging.
  - Full recompute or shared-expert overlap must remain enabled.
  - You have not benchmarked the exact model and parallelism shape.
interactions:
  - name: flex_dispatcher_activation
    detail: >
      `moe_flex_dispatcher_backend` alone is not enough. DeepEP or HybridEP is
      activated only when `apply_flex_dispatcher_backend(...)` switches the
      dispatcher to `flex`.
  - name: pipeline_parallelism
    detail: >
      If `pipeline_model_parallel_size > 1`, EP overlap requires
      `virtual_pipeline_model_parallel_size`.
  - name: recompute
    detail: >
      EP overlap does not support `recompute_granularity="full"`,
      `recompute_method != None`, or `recompute_num_layers != None`.
  - name: shared_expert_overlap
    detail: >
      EP overlap and `moe_shared_expert_overlap` are mutually exclusive.
  - name: cuda_graphs
    detail: >
      `delay_wgrad_compute` plus CUDA-graph capture adds TE-version,
      gradient-accumulation-fusion, and attention-bias restrictions.
feature_meaning:
  overlap_moe_expert_parallel_comm: >
    Overlap expert-parallel token dispatch or combine communication with expert
    compute.
  delay_wgrad_compute: >
    Delay expert weight-gradient computation to create additional overlap.
  flex_dispatcher_backend: >
    Backend selection for DeepEP or HybridEP once the dispatcher is explicitly
    switched to `flex`.
config_keys:
  - comm_overlap.overlap_moe_expert_parallel_comm
  - comm_overlap.delay_wgrad_compute
  - model.expert_model_parallel_size
  - model.num_moe_experts
  - model.moe_token_dispatcher_type
  - model.moe_flex_dispatcher_backend
  - model.moe_shared_expert_overlap
  - model.virtual_pipeline_model_parallel_size
recommended_path:
  first_rollout: enable `overlap_moe_expert_parallel_comm` only
  delayed_wgrad: keep `delay_wgrad_compute=False` unless benchmarked
  dispatcher: use `apply_flex_dispatcher_backend(...)` for DeepEP or HybridEP
  benchmarking: compare baseline, overlap, and overlap-wgrad with the same `CommOverlapConfig` shape
expected_metric_change:
  - metric: step_time
    direction: flat
    magnitude: "~0%"
    conditions: Qwen3-30B-A3B, EP=4, 2 nodes, `alltoall`, GBS=8
    evidence_status: measured
  - metric: step_time
    direction: up
    magnitude: "~13%"
    conditions: Qwen3-30B-A3B, EP=4, 2 nodes, `alltoall`, GBS=64
    evidence_status: measured
  - metric: step_time
    direction: up
    magnitude: "~4.8%"
    conditions: Qwen3-Next-80B-A3B, EP=8, 8 nodes, `alltoall`, `delay_wgrad_compute=True` vs overlap-only
    evidence_status: measured
  - metric: throughput
    direction: mixed
    conditions: Large-EP, communication-bound MoE runs, especially with `flex` dispatchers
    evidence_status: expected
minimal_example:
  script: scripts/experiments/ep_overlap_qwen3_moe.py
  models:
    - qwen3_30b
    - qwen3_next_80b
  variants:
    - baseline
    - overlap
    - overlap-wgrad
  note: >
    The wrapper initializes `CommOverlapConfig` in code because CLI overrides
    cannot create it from `None`.
failure_modes:
  - name: missing_comm_overlap_object
    symptom: "AttributeError or NoneType failure when overriding comm_overlap.*"
    likely_cause: recipe leaves `comm_overlap=None`
    fix: initialize `CommOverlapConfig` in code or use the wrapper experiment script
  - name: missing_vpp
    symptom: "AssertionError about virtual_pipeline_model_parallel_size"
    likely_cause: `PP > 1` without VPP
    fix: set `virtual_pipeline_model_parallel_size`
  - name: unsupported_recompute_or_shared_expert
    symptom: "AssertionError about recompute or moe_shared_expert_overlap"
    likely_cause: incompatible feature combination
    fix: disable full recompute, recompute method or layers, and shared-expert overlap
  - name: flex_backend_not_active
    symptom: "Run still uses alltoall semantics after setting moe_flex_dispatcher_backend"
    likely_cause: dispatcher never switched to `flex`
    fix: call `apply_flex_dispatcher_backend(...)`
  - name: slower_than_baseline
    symptom: "Overlap run is flat or slower than baseline"
    likely_cause: A2A cost is too small relative to added scheduling overhead
    fix: benchmark on larger EP, more nodes, more micro-batches, or a `flex` backend
known_constraints:
  - expert_model_parallel_size must be greater than 1.
  - num_moe_experts must be greater than 1.
  - moe_token_dispatcher_type must be `alltoall` or `flex`.
  - Precision must be BF16 or FP16.
  - PyTorch must be at least 2.6.0.
  - If PP is used, virtual pipeline parallelism is required.
  - `recompute_granularity` must not be `full`.
  - `recompute_method` must be `None`.
  - `recompute_num_layers` must be `None`.
  - `moe_shared_expert_overlap` must be `False`.
  - `mtp_num_layers` must be `None` or `1`.
known_limitations:
  - Repo measurements do not yet show a throughput win for `alltoall` EP overlap.
  - `delay_wgrad_compute` has been slower in both measured workloads.
  - Setting `moe_flex_dispatcher_backend` alone does not activate `flex`.
  - Public recipes are conservative and often leave EP overlap disabled by default.
evidence:
  - source: docs/training/communication-overlap.md
    kind: docs
    takeaway: stable recommendation boundary and measured EP guidance
  - source: src/megatron/bridge/training/comm_overlap.py
    kind: code
    takeaway: validation gates for EP overlap and delayed wgrad
  - source: src/megatron/bridge/training/flex_dispatcher_backend.py
    kind: code
    takeaway: helper flips dispatcher to `flex` and disables shared-expert overlap
  - source: scripts/experiments/ep_overlap_qwen3_moe.py
    kind: harness
    takeaway: wrapper path for recipes that leave `comm_overlap=None`
  - source: tests/unit_tests/training/test_comm_overlap.py
    kind: unit_test
    takeaway: local coverage for overlap validation logic
  - source: tests/unit_tests/training/test_deepep.py
    kind: unit_test
    takeaway: local coverage for DeepEP or HybridEP helper behavior
  - source: .local/ep_overlap_verification_report.md
    kind: experiment
    takeaway: Qwen3-30B-A3B EP=4 measured results, including flat and slower cases
  - source: .local/ep_overlap_qwen3_moe_experiment_tracker_2026-03-21.md
    kind: experiment
    takeaway: experiment design and wrapper-script rationale for Qwen3-30B-A3B
  - source: .local/ep_overlap_qwen3_next_experiment_tracker_2026-03-21.md
    kind: experiment
    takeaway: Qwen3-Next-80B-A3B EP=8 results and baseline NaN context
follow_up_validation:
  - Benchmark EP=16+ on more nodes with `deepep` or `hybridep`.
  - Re-test on a standard-attention MoE model to isolate the Qwen3-Next baseline NaN.
  - Check SFT or packed-sequence interactions separately from pretrain.
  - Re-benchmark at production-scale GBS where A2A cost is larger.
