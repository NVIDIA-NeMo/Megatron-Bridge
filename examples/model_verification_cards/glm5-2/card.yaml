# Agent-readable model verification card.
# status: unverified | verified | unsupported | not_applicable

title: glm5_2
summary: >
  Performance disclaimer: this model has not been performance-tuned; reported
  timing and throughput metrics are sanity checks, not optimized performance
  results. GLM-5.2 has landed Bridge support and public H100 and GB200 128K SFT
  recipes. Earlier H100 synthetic long-context runs exercised BF16
  TP1/PP13/CP32/EP32 with cuDNN DSA; the tested variants covered sparse indexer
  loss and MTP-enabled execution, but the configured 500-step workloads did not
  finish. Earlier GB200 SFT runs are recorded only as unverified reference
  targets. All card items remain unverified under the model-verification
  completion gates.
verification_index:
  model_level:
    unverified: all
  training:
    GB200:
      unverified: all
    H100:
      unverified: all
model:
  hf_id: zai-org/GLM-5.2
  hf_revision: 4d67f66cc64d3219133b767c253b2ad1425c6c88  # pragma: allowlist secret
  architecture: GlmMoeDsaForCausalLM
  min_transformers_version: "5.12.1"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: 40a49d83172b2f4d1d8becd6d426424836707eac  # pragma: allowlist secret

items:
  hf_to_megatron_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model zai-org/GLM-5.2
      --hf-revision 4d67f66cc64d3219133b767c253b2ad1425c6c88
      --megatron-path work/model-verification/glm5-2/cpu-megatron
      --torch-dtype bfloat16
    last_verified: null
    expected_result: >
      Verification requires a successful import, checkpoint reload, and exact
      key, shape, dtype, and value comparison against the pinned HF revision.

  hf_to_megatron_gpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 8 --gpus-per-node 8
      --hf-model zai-org/GLM-5.2
      --hf-revision 4d67f66cc64d3219133b767c253b2ad1425c6c88
      --megatron-path work/model-verification/glm5-2/imported-megatron
      --torch-dtype bfloat16 --tp 2 --pp 1 --ep 32
    last_verified: null
    expected_result: >
      Verification requires a successful distributed import, checkpoint reload,
      and exact key, shape, dtype, and value comparison against the pinned HF
      revision. Prior checkpoint creation did not include this full comparison.

  megatron_to_hf_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model zai-org/GLM-5.2
      --hf-revision 4d67f66cc64d3219133b767c253b2ad1425c6c88
      --megatron-path work/model-verification/glm5-2/cpu-megatron/iter_0000000
      --hf-path work/model-verification/glm5-2/cpu-hf-export
      --torch-dtype bfloat16
    last_verified: null
    expected_result: >
      Verification requires strict Transformers reload and exact exported key,
      shape, dtype, and value comparison against the pinned HF revision.

  megatron_to_hf_gpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 8 --gpus-per-node 8
      --hf-model zai-org/GLM-5.2
      --hf-revision 4d67f66cc64d3219133b767c253b2ad1425c6c88
      --megatron-path work/model-verification/glm5-2/imported-megatron/iter_0000000
      --hf-path work/model-verification/glm5-2/hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 2 --pp 1 --ep 32
    last_verified: null
    expected_result: >
      Verification requires successful strict export, Transformers reload, and
      exact key, shape, dtype, and value comparison against the pinned HF
      revision.

  manual_forward_pass:
    status: unverified
    precision: bf16
    command: null
    last_verified: null
    expected_result: >
      No completed pinned-revision HF and Megatron logit-correlation run is
      recorded for GLM-5.2.

  inference:
    status: unverified
    precision: bf16
    command: null
    last_verified: null
    expected_result: >
      No completed pair of deterministic Megatron generation runs with an exact
