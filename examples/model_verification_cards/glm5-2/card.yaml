        GLM-5.2 pretraining verification has not been recorded for this card.

  sft:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        The available runs used synthetic 128K data for long-context support and
        performance testing; they do not verify bounded real-data full SFT.
    GB200:
      status: unverified
      precision: bf16
      enabled_features:
        sequence_packing: offline
        context_parallel_size: 32
        moe_dispatcher: hybridep
      command: >
        ./scripts/training/train.sh --wait --nodes 48 --gpus-per-node 4
        --recipe glm52_sft_192gpu_gb200_bf16_config --mode sft
        --pretrained_checkpoint work/model-verification/glm5-2/imported-megatron/iter_0000000
        --max_steps 50
        --save_dir work/model-verification/glm5-2/sft-cudnn-checkpoints
        --save_interval 50
        model.dsa_kernel_backend=cudnn
        model.dsa_indexer_loss_coeff=0.001
        model.dsa_indexer_use_sparse_loss=true
        checkpoint.load=null logger.log_interval=1 logger.log_throughput=true
      last_verified: null
      metrics:
        initial_loss: 9.339188
        final_loss: 1.372691
        last_10_steps_step_time_ms_avg: 138212.340
        last_10_steps_model_tflops_per_gpu_avg: 350.450
      expected_result: >
        Reference target from previous GLM-5.2 GB200 SFT runs: the TP1/PP6/CP32
        EP32/ETP1 cuDNN sparse-indexer-loss configuration completed 50 steps
        with finite losses, final grad norm 7243.127, and tail-10 throughput
        350.450 TFLOP/s/GPU. Re-run with the public launcher before marking
        this item verified.

  sft_export_inference:
    H100:
      status: unverified
      precision: bf16
      depends_on: sft
      commands: null
      last_verified: null
      expected_result: >
        No completed full-SFT checkpoint export, strict Transformers reload, and
        repeated deterministic HF inference result is recorded.
    GB200:
      status: unverified
      precision: bf16
      depends_on: sft
      commands: null
      last_verified: null
      expected_result: >
        Export and deterministic HF reload/inference from the GLM-5.2 SFT
        checkpoint have not been run for this card.

  sft_long_context:
    H100:
      status: unverified
      precision: bf16
      enabled_features:
        sequence_packing: offline
        context_parallel_size: 32
        moe_dispatcher: deepep
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        A portable public command for the prior packed synthetic workload is not
        yet recorded. Verification requires a bounded run on H100 with
        TP1/PP13/VPP2/CP32/EP32/ETP1, GBS/MBS 520/1, offline packed 128K THD
        sequences, cuDNN DSA, sparse indexer loss coefficient 0.001, and one MTP
        layer. Loss must remain finite with no skipped or NaN iterations and all
        four terminal-window metrics must be recorded. The sparse-loss-on
        reference reached 16 of 500 steps, while the later MTP-enabled loss-off
        reference reached 19 of 500; neither completed its configured workload,
        so neither satisfies this gate.
    GB200:
      status: unverified
      precision: bf16
      enabled_features:
        sequence_packing: offline
        context_parallel_size: 32
        moe_dispatcher: hybridep
      command: >
        ./scripts/training/train.sh --wait --nodes 48 --gpus-per-node 4
        --recipe glm52_sft_192gpu_gb200_bf16_config --mode sft
        --pretrained_checkpoint work/model-verification/glm5-2/imported-megatron/iter_0000000
        --max_steps 50
        --save_dir work/model-verification/glm5-2/sft-long-context-cudnn-checkpoints
        --save_interval 50
        model.dsa_kernel_backend=cudnn
        model.dsa_indexer_loss_coeff=0.001
        model.dsa_indexer_use_sparse_loss=true
        checkpoint.load=null logger.log_interval=1 logger.log_throughput=true
      last_verified: null
      metrics:
        initial_loss: 9.339188
        final_loss: 1.372691
        last_10_steps_step_time_ms_avg: 138212.340
        last_10_steps_model_tflops_per_gpu_avg: 350.450
      expected_result: >
        Reference target from previous GLM-5.2 GB200 long-context SFT runs: the
        128K packed-THD TP1/PP6/CP32 EP32/ETP1 cuDNN sparse-indexer-loss
        configuration completed 50 steps with finite losses, final grad norm
        7243.127, and tail-10 throughput 350.450 TFLOP/s/GPU. A longer cuDNN
        trajectory reached 500 steps and ended with LM loss 2.720561e-4 and
        grad norm 0.167 on its logged dataset. Re-run with the public launcher
        before marking this item verified.

  peft:
    H100:
      status: unverified
      precision: bf16
