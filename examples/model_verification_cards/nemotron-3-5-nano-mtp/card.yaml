          scopes: [attn, mamba, moe_router, moe_preprocess]
        moe_dispatcher: hybridep
      command: >
        ./scripts/training/train.sh --wait --nodes 2 --gpus-per-node 4
        --recipe nemotron_3_5_nano_pretrain_8gpu_gb200_bf16_config --mode pretrain
