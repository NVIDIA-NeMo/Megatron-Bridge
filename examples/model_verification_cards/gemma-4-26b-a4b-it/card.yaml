# Agent-readable model verification card.
# status: unverified | verified | unsupported | not_applicable

title: gemma_4_26b_a4b_it
summary: >
  Performance disclaimer: this model has not been performance-tuned; reported
  timing and throughput metrics are sanity checks, not optimized performance
  results. Gemma 4 26B-A4B-it GPU import, GPU export, and deterministic
  multimodal inference are verified. FP32 manual forward comparison is also
  verified. Full SFT remains unverified because the default and selective-MLP
  configurations exceed H100 memory, while full-layer recompute is too slow
  for the 10-step verification window. Long-context SFT and PEFT are pending.
  CPU conversion is blocked by CUDA device initialization during provider
  setup. The published Bridge recipes do not currently provide VLM pretraining.
verification_index:
  model_level:
    verified:
      - hf_to_megatron_gpu
      - megatron_to_hf_gpu
      - manual_forward_pass
      - inference
    unverified:
      - hf_to_megatron_cpu
      - megatron_to_hf_cpu
  training:
    H100:
      unverified: [sft, sft_export_inference, sft_long_context, peft]
      unsupported: [pretrain, checkpoint_resume]
model:
  hf_id: google/gemma-4-26B-A4B-it
  hf_revision: 4d7ae4984b7db7de8f8457170b3f1a419ee76d52  # pragma: allowlist secret
  architecture: Gemma4ForConditionalGeneration
  min_transformers_version: "5.8.0"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: d31431406a7fb185d9f87244d3c4cb5997a7deb0  # pragma: allowlist secret

items:
  hf_to_megatron_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --megatron-path work/model-verification/gemma-4-26b-a4b-it/cpu-megatron
      --torch-dtype bfloat16
    last_verified: null
    expected_result: >
      The 2026-07-23 attempt stopped before model construction because
      provider initialization selected a CUDA device on the CPU-only executor.
      CPU import remains unverified until provider setup supports an executor
      with no visible CUDA device.

  hf_to_megatron_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8 --hf-model google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --megatron-path work/model-verification/gemma-4-26b-a4b-it/imported-megatron
      --torch-dtype bfloat16 --tp 4 --pp 2 --ep 1
    last_verified: 2026-07-23
    expected_result: >
      The command completed successfully at TP4/PP2/EP1. It loaded 8,548
      conversion mappings from the immutable Hugging Face revision and saved
      the full multimodal BF16 checkpoint as iter_0000000. The artifact then
      reloaded successfully for distributed export and direct-model inference.

  megatron_to_hf_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --megatron-path work/model-verification/gemma-4-26b-a4b-it/cpu-megatron/iter_0000000
      --hf-path work/model-verification/gemma-4-26b-a4b-it/cpu-hf-export
      --torch-dtype bfloat16
    last_verified: null
    expected_result: >
      CPU export is blocked on the unverified CPU import artifact. Once CPU
      provider initialization works, export must complete with the expected
      key set, shapes, and BF16 dtypes, then reload natively as
      Gemma4ForConditionalGeneration.

  megatron_to_hf_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8 --hf-model google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --megatron-path work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
      --hf-path work/model-verification/gemma-4-26b-a4b-it/hf-export-verified
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 2 --pp 1 --ep 4 --etp 1
    last_verified: 2026-07-23
    expected_result: >
      Distributed TP2/PP1/EP4 export completed all 2,788 conversion mappings.
      The exported config preserved sliding-attention rope_theta 10000 and
      full-attention rope_theta 1000000. Transformers natively loaded all 1,013
      weight entries without missing or unexpected-key diagnostics. Two BF16
      VLM generations were byte-identical; the exact 32-token completion was
      "The animal on the candy is a **turtle**. These are Turtle Dips, which are
      chocolate-covered candies shaped like turtles.of\nThe animal on the".

  manual_forward_pass:
    status: verified
    precision: fp32
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/compare_hf_and_megatron/compare.py
      --hf_model_path google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --model_class Gemma4ForConditionalGeneration
      --hf-dtype float32 --hf-device-map auto
      --megatron_model_path work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
      --image_path work/model-verification/gemma-4-26b-a4b-it/candy.JPG
      --tp 2 --pp 1 --ep 4 --etp 1 --distributed-timeout-minutes 60
      --prompt "What is in this image?"
    last_verified: 2026-07-23
    expected_result: >
      Token match: true. The sharded FP32 Hugging Face reference and FP32
      Megatron model both selected token 1455, rendered as " An". Cosine
      similarity: 0.999757; maximum and mean absolute logit differences were
      0.505172 and 0.083505.
      The immutable-revision processor tokenized this prompt and image turn to
      20 tokens, exactly divisible by TP2, so the comparison helper added no
      padding. The image came from documentation-images revision
      bc25e2903646a3d325c5632a0683122f7f755ed4 and had SHA-256
      fc417c899e94f8df465b7541c5a70f0eebb85c414d06345f0b290c061eccc84c.

  inference:
    status: verified
    precision: fp32
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/hf_to_megatron_generate_vlm.py
      --hf_model_path google/gemma-4-26B-A4B-it
      --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
      --megatron_model_path work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
      --image_path work/model-verification/gemma-4-26b-a4b-it/candy.JPG
      --prompt "What animal is on the candy?" --max_new_tokens 32
      --tp 2 --pp 1 --ep 4 --etp 1
    last_verified: 2026-07-23
    expected_result: >
      Two independent runs using FP32 greedy decoding completed 32 generation
      steps and produced byte-identical output, including whitespace, with SHA-256
      f06e8dfaf7736afb2efea58bdcb33febdb31cb29943a5954ae8a35a75ce41324.
      The exact 32-token completion, with control-token boundaries rendered as
      whitespace, was "The animal on the candy is a turtle. image/png thought
      The animal on the candy is a turtle. thought".
      The pinned image has SHA-256
      fc417c899e94f8df465b7541c5a70f0eebb85c414d06345f0b290c061eccc84c.

  pretrain:
    all:
      status: unsupported
      precision: null
      enabled_features: {}
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        Megatron Bridge does not publish a pretraining recipe for this Gemma 4
        conditional-generation variant; the current model package provides SFT
        and PEFT recipes only.

  sft:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
        --recipe gemma4_vl_26b_sft_config --mode sft --dataset cord-v2
        --pretrained_checkpoint work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
        --max_steps 10 --seq_length 4096
        'dataset.source.load_kwargs={revision:"7f0115a4b758a71d6473b8d085751692da2fef98"}'
        validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
        --save_dir work/model-verification/gemma-4-26b-a4b-it/sft-checkpoints
        --save_interval 10 logger.log_interval=1 logger.log_throughput=true
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        On 2026-07-23 the default 8-GPU TP2/PP1/EP8/ETP1 run and a GBS4
        selective-MLP recompute run both failed before the first completed
        optimizer step. Each rank had about 77.84 to 78.70 GiB in use and
        needed an additional 1 to 2 GiB. Full 30-layer recompute crossed that
        memory peak, but one GBS4 optimizer step did not finish during more
        than nine observed minutes. No valid 10-step metrics or iter_0000010
        checkpoint were produced, so SFT remains unverified.

  sft_export_inference:
    H100:
      status: unverified
      precision: bf16
      depends_on: sft
      commands:
        - >
          ./scripts/conversion/convert.sh export --executor slurm --device gpu
          --nodes 1 --gpus-per-node 8 --hf-model google/gemma-4-26B-A4B-it
          --hf-revision 4d7ae4984b7db7de8f8457170b3f1a419ee76d52
          --megatron-path work/model-verification/gemma-4-26b-a4b-it/sft-checkpoints/iter_0000010
          --hf-path work/model-verification/gemma-4-26b-a4b-it/sft-hf-export
          --torch-dtype bfloat16 --export-weight-dtype bfloat16
          --distributed-save --tp 2 --pp 1 --ep 8 --etp 1
        - >
          uv run python
          skills/create-model-verification-card/scripts/verify_hf_inference.py
          --hf-model work/model-verification/gemma-4-26b-a4b-it/sft-hf-export
          --image-path work/model-verification/gemma-4-26b-a4b-it/candy.JPG
          --prompt "What animal is on the candy?" --max-new-tokens 32
          --dtype bfloat16 --device cuda
      last_verified: null
      expected_result: >
        This item is blocked because SFT produced no verified iter_0000010
        checkpoint. Once that dependency passes, the checkpoint must export
        and strictly reload as Gemma4ForConditionalGeneration. The VLM helper
        must generate exactly 32 new tokens twice with byte-identical token IDs
        and literal completion, including whitespace. The pinned image has SHA-256
        fc417c899e94f8df465b7541c5a70f0eebb85c414d06345f0b290c061eccc84c.

  sft_long_context:
    H100:
      status: unverified
      precision: bf16
      enabled_features:
        sequence_packing: in_batch
        context_parallel_size: 2
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
        --recipe gemma4_vl_26b_sft_long_context_config --mode sft
        --dataset cord-v2
        --pretrained_checkpoint work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
        --max_steps 10
        'dataset.source.load_kwargs={revision:"7f0115a4b758a71d6473b8d085751692da2fef98"}'
        validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
        --save_dir work/model-verification/gemma-4-26b-a4b-it/sft-long-context-checkpoints
        --save_interval 10 logger.log_interval=1 logger.log_throughput=true
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        The TP2/PP1/CP2/EP8/ETP1 full-SFT run must truncate each of two
        examples to 4K, pack them into an emergent THD sequence of at most 8K,
        and complete exactly 10 optimizer steps with finite loss, no skipped or
        NaN iterations, all four required metrics, and a reloadable final
        checkpoint.

  peft:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
        --recipe gemma4_vl_26b_peft_config --mode lora --dataset cord-v2
        --pretrained_checkpoint work/model-verification/gemma-4-26b-a4b-it/imported-megatron/iter_0000000
        --max_steps 10 --seq_length 4096
        'dataset.source.load_kwargs={revision:"7f0115a4b758a71d6473b8d085751692da2fef98"}'
        validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
        --save_dir work/model-verification/gemma-4-26b-a4b-it/peft-checkpoints
        --save_interval 10 logger.log_interval=1 logger.log_throughput=true
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        The 4-GPU TP2/PP1/EP4 LoRA run must complete exactly 10 optimizer steps
        with finite loss, no skipped or NaN iterations, all four required
        metrics, and a reloadable final adapter checkpoint.

  checkpoint_resume:
    all:
      status: unsupported
      precision: null
      depends_on: pretrain
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      resume_comparison: null
      expected_result: >
        Megatron Bridge does not provide a Gemma 4 VLM pretraining recipe, so
        there is no supported reference run, middle checkpoint, optimizer/RNG
        state contract, or model-wide checkpoint-resume workflow to verify.
