# Draft agent-readable model verification card.
# status: unverified | verified | unsupported | not_applicable
# last_verified: YYYY-MM-DD or null
# verified requires an immutable hf_revision, successful command(s), a concrete
# expected_result, and non-null last_verified.
# unverified may retain an older last_verified date when validation is stale.
# Every training result is nested under its public hardware target.

title: qwen3_8b
summary: >
  Performance disclaimer: this model has not been performance-tuned; reported
  timing and throughput metrics are sanity checks, not optimized performance
  results. Qwen3-8B support verification covers conversion, inference, and
  training.
verification_index:
  model_level:
    verified: all
  training:
    H100:
      verified: all
    GB200:
      unverified: all
model:
  hf_id: Qwen/Qwen3-8B
  hf_revision: b968826d9c46dd6066d109eabc6255188de91218  # pragma: allowlist secret
  architecture: Qwen3ForCausalLM
  min_transformers_version: "5.8.1"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: 5c56eab34c540fad08544c38b7cc39d662fb7475  # pragma: allowlist secret

items:
  hf_to_megatron_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/cpu-megatron
      --torch-dtype bfloat16
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      round-trips through CPU export with all 399 HF tensors matching the
      recorded HF revision exactly in keys, shapes, dtypes, and values.

  hf_to_megatron_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 4
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/imported-megatron
      --torch-dtype bfloat16 --tp 4
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      reloads at TP=4 with weights exactly matching the recorded HF revision.

  megatron_to_hf_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-8b/cpu-hf-export
    last_verified: 2026-07-16
    expected_result: >
      The command exits successfully; all 399 exported tensors match the
      recorded HF revision exactly, and the export reloads on CPU as
      Qwen3ForCausalLM.

  megatron_to_hf_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 4
      --hf-model Qwen/Qwen3-8B
      --megatron-path work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-8b/hf-export --torch-dtype bfloat16
      --export-weight-dtype bfloat16 --distributed-save --tp 4
    last_verified: 2026-07-16
    expected_result: >
      Strict export exits successfully and the Hugging Face output reloads with
      AutoModelForCausalLM as Qwen3ForCausalLM.

  manual_forward_pass:
    status: verified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      examples/conversion/compare_hf_and_megatron/compare.py
      --hf_model_path Qwen/Qwen3-8B
      --megatron_model_path work/model-verification/qwen3-8b/imported-megatron/iter_0000000
      --tp 4 --prompt "The capital of France is the city of"
    last_verified: 2026-07-17
    expected_result: >
      The one-step comparison of the eight-token prompt exits successfully; the
      Hugging Face and Megatron next-token predictions match at token ID 12095
      (" Paris"), and cosine similarity is 0.999969, above the 0.99 correlation
      gate. This historical result predates explicit helper revision pinning
      and is retained against the recorded immutable HF revision. The maximum
      and mean absolute logit differences are 0.187500 and 0.030649,
      respectively; both are report-only diagnostic observations.

  inference:
    status: verified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=4
      examples/conversion/hf_to_megatron_generate_text.py
      --hf_model_path Qwen/Qwen3-8B
      --megatron_model_path work/model-verification/qwen3-8b/imported-megatron/iter_0000000 --tp 4
      --prompt "The capital of France is" --max_new_tokens 32
    last_verified: 2026-07-16
    expected_result: >
      Two independent executions exit successfully after exactly 32 generation
      steps and print this byte-identical completion, including its leading space,
      " Paris. The capital of Italy is Rome. The capital of Spain is Madrid. The
      capital of Germany is Berlin. The capital of the Netherlands is Amsterdam. The".

  pretrain:
    H100:
      status: verified
      precision: bf16
      bridge_commit: 619cc20bd3c7eca1dc84e8ea0f822307dfbd5cc3  # pragma: allowlist secret
      enabled_features: {}
      command: >
        ./scripts/training/train.sh --nodes 2 --gpus-per-node 8
        --recipe qwen3_8b_pretrain_16gpu_h100_bf16_config --mode pretrain
        --dataset megatron-indexed --seq_length 4096
        --max_steps 100
        --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
        'dataset.blend=[["work/data/rp2/head_01"],null]'
        dataset.path_to_cache=work/cache/qwen3-8b/rp2
        tokenizer.tokenizer_type=SentencePieceTokenizer
        tokenizer.tokenizer_model=work/data/rp2/tokenizer.model
        rng.seed=1234 dataset.random_seed=1234
        scheduler.lr_decay_iters=100 validation.eval_iters=0 validation.eval_interval=0
        dist.distributed_timeout_minutes=30
        ddp.check_for_nan_in_grad=true ddp.check_for_large_grads=true
        rerun_state_machine.check_for_nan_in_loss=true checkpoint.load=null
        --save_dir work/model-verification/qwen3-8b/pretrain-reference-checkpoints --save_interval 50
        logger.log_interval=1 logger.log_throughput=true logger.tensorboard_dir=null
      last_verified: 2026-07-21
      metrics:
        initial_loss: 12.73617
        final_loss: 6.190218
        last_10_steps_step_time_ms_avg: 25070.320
        last_10_steps_model_tflops_per_gpu_avg: 512.700
      expected_result: >
        The uninterrupted 16-GPU bounded RP2 run completes exactly 100 steps at
        TP1/PP1/CP1, DP16, GBS/MBS 1024/1, and 64-way gradient accumulation. It
        reaches peak learning rate at step 40 and completes cosine decay at step
        100. LM loss is finite from 12.73617 to 6.190218 with no skipped or NaN
        iterations, all four metrics are recorded, the post-setup configuration
        persists, and complete 16-shard iter_0000050 and iter_0000100 checkpoints
        are saved.

  sft:
    H100:
      status: verified
      precision: bf16
      bridge_commit: f3ae2767b5e18aeb67b726cd8d5f1db58216dcc9  # pragma: allowlist secret
      enabled_features:
        sequence_packing: offline
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 4
        --recipe qwen3_8b_sft_4gpu_h100_bf16_config --mode sft
        --dataset tulu3
        --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
        --max_steps 100 --seq_length 2048
        --lr 5e-6 --min_lr 0 --warmup_iters 10
        'dataset.hf_dataset.split="train[:10000]"'
        'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
        '++tokenizer.hf_tokenizer_kwargs.revision="b968826d9c46dd6066d109eabc6255188de91218"'
        dataset.hf_output_root=work/data/tulu3/qwen3-8b-sft-b14afda60f1b
        dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
        dataset.do_validation=false dataset.hf_validation_proportion=null
        dataset.enable_offline_packing=true
        +dataset.offline_packing_specs.pad_seq_to_mult=1 scheduler.lr_decay_iters=100
        validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
        --save_dir work/model-verification/qwen3-8b/sft-checkpoints --save_interval 100
        logger.log_interval=1 logger.log_throughput=true
      last_verified: 2026-07-19
      metrics:
        initial_loss: 1.657044
        final_loss: 0.9733383
        last_10_steps_step_time_ms_avg: 7424.240
        last_10_steps_model_tflops_per_gpu_avg: 101.630
      expected_result: >
        Immutable Tulu3 pad-1 offline packing is 99.30% efficient. Full SFT uses
        DP=1 with 32 gradient-accumulation steps and reaches step 100 with the four
        recorded metrics, finite loss, and no skipped or NaN iterations. Across
        6,553,600 token slots, the sampled assistant-only loss masks contain
        4,350,004 supervised tokens. The complete four-shard iter_0000100
        full-model checkpoint is saved.

  sft_export_inference:
    H100:
      status: verified
      precision: bf16
      bridge_commit: f3ae2767b5e18aeb67b726cd8d5f1db58216dcc9  # pragma: allowlist secret
      depends_on: sft
      commands:
        - >
          ./scripts/conversion/convert.sh export --executor slurm --device gpu
          --nodes 1 --gpus-per-node 4 --hf-model Qwen/Qwen3-8B
          --megatron-path work/model-verification/qwen3-8b/sft-checkpoints/iter_0000100
          --hf-path work/model-verification/qwen3-8b/sft-hf-export
          --torch-dtype bfloat16 --export-weight-dtype bfloat16
          --distributed-save --tp 4
        - >
          uv run python
          skills/create-model-verification-card/scripts/verify_hf_inference.py
          --hf-model work/model-verification/qwen3-8b/sft-hf-export
          --prompt "Name the capital of France and explain its role in one sentence."
          --max-new-tokens 45 --chat-template --disable-thinking
      last_verified: 2026-07-19
      expected_result: >
        The current full-SFT checkpoint exports as five indexed BF16 shards with
        399 weights, config vocabulary size 151936, and embedding and output-head
        shapes [151936, 4096]. Transformers natively reloads all 399 weights, and
        two independent runs using greedy generation produce byte-identical token
        IDs and exactly 45 new tokens with this literal completion, including the
        escaped blank line: "The capital of France is Paris. It is the political, economic, and cultural center of France and serves as the seat of the French government. ✅\n\nParis is also a major tourist destination, known for its iconic landmarks".

  sft_long_context:
    H100:
      status: verified
      precision: bf16
      bridge_commit: f3ae2767b5e18aeb67b726cd8d5f1db58216dcc9  # pragma: allowlist secret
      enabled_features:
        sequence_packing: offline
        context_parallel_size: 2
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 8
        --recipe qwen3_8b_sft_32k_config --mode sft
        --dataset tulu3
        --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
        --max_steps 20 --seq_length 32768 --context_parallel_size 2
        --lr 1e-6 --min_lr 0 --warmup_iters 2
        'dataset.hf_dataset.split="train[:10000]"'
        'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
        '++tokenizer.hf_tokenizer_kwargs.revision="b968826d9c46dd6066d109eabc6255188de91218"'
        dataset.hf_output_root=work/data/tulu3/qwen3-8b-long-context-b14afda60f1b
        dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
        dataset.do_validation=false dataset.hf_validation_proportion=null
        dataset.enable_offline_packing=true
        +dataset.offline_packing_specs.pad_seq_to_mult=8
        model.sequence_parallel=true
        model.cp_comm_type=a2a model.cross_entropy_loss_fusion=false
        scheduler.lr_decay_iters=20 validation.eval_iters=0 validation.eval_interval=0
        checkpoint.load=null checkpoint.save=null
        logger.log_interval=1 logger.log_throughput=true
      last_verified: 2026-07-20
      metrics:
        initial_loss: 1.611622
        final_loss: 1.490618
        last_10_steps_step_time_ms_avg: 71668.780
        last_10_steps_model_tflops_per_gpu_avg: 34.080
      expected_result: >
        The immutable-revision 8-GPU run completes exactly 20 Tulu3 SFT steps at
        sequence length 32768 with recipe-owned TP4/PP1/CP2/SP-on, GBS/MBS 8/1,
        and explicit pad-8 offline packing. LM loss is 1.611622 to 1.490618;
        skipped/NaN totals are 0/0. The persisted post-setup runtime config
        matches the command, packing is 99.97%, and the sampled training window
        contains 3,444,917 actual supervised tokens.

  peft:
    H100:
      status: verified
      precision: bf16
      bridge_commit: f3ae2767b5e18aeb67b726cd8d5f1db58216dcc9  # pragma: allowlist secret
      enabled_features:
        sequence_packing: offline
      command: >
        ./scripts/training/train.sh --nodes 1 --gpus-per-node 1
        --recipe qwen3_8b_peft_1gpu_h100_bf16_config --mode lora
        --dataset tulu3
        --pretrained_checkpoint work/model-verification/qwen3-8b/imported-megatron/iter_0000000
        --max_steps 100 --seq_length 2048
        --lr 1e-4 --min_lr 0 --warmup_iters 10
        'dataset.hf_dataset.split="train[:10000]"'
        'dataset.hf_dataset.load_kwargs={revision:"b14afda60f1bbebe55d5d2fa1e4df5042f97f8be"}'
        '++tokenizer.hf_tokenizer_kwargs.revision="b968826d9c46dd6066d109eabc6255188de91218"'
        dataset.hf_output_root=work/data/tulu3/qwen3-8b-peft-b14afda60f1b
        dataset.hf_rewrite=true dataset.seed=1234 rng.seed=5678
        dataset.do_validation=false dataset.hf_validation_proportion=null
        dataset.enable_offline_packing=true
        +dataset.offline_packing_specs.pad_seq_to_mult=4 scheduler.lr_decay_iters=100
        validation.eval_iters=0 validation.eval_interval=0 checkpoint.load=null
        --save_dir work/model-verification/qwen3-8b/peft-checkpoints --save_interval 100
        logger.log_interval=1 logger.log_throughput=true
      last_verified: 2026-07-19
      metrics:
        initial_loss: 1.527745
        final_loss: 1.170038
        last_10_steps_step_time_ms_avg: 7774.790
        last_10_steps_model_tflops_per_gpu_avg: 387.430
      expected_result: >
        Immutable Tulu3 pad-4 offline packing is 99.39% efficient. The 100 LoRA
        steps use DP=1 with 32 gradient-accumulation steps and complete with the
        four recorded metrics, finite loss, and no skipped or NaN iterations.
        Across 6,553,600 token slots, the sampled assistant-only loss masks
        contain 4,332,480 supervised tokens. The complete single-shard
        iter_0000100 adapter checkpoint is saved.

  checkpoint_resume:
    H100:
      status: verified
      precision: bf16
      bridge_commit: 619cc20bd3c7eca1dc84e8ea0f822307dfbd5cc3  # pragma: allowlist secret
      depends_on: pretrain
      command: >
        ./scripts/training/train.sh --nodes 2 --gpus-per-node 8
        --recipe qwen3_8b_pretrain_16gpu_h100_bf16_config --mode pretrain
        --dataset megatron-indexed --seq_length 4096
        --max_steps 100
        --lr 3e-4 --min_lr 3e-5 --warmup_iters 40
        'dataset.blend=[["work/data/rp2/head_01"],null]'
        dataset.path_to_cache=work/cache/qwen3-8b/rp2
        tokenizer.tokenizer_type=SentencePieceTokenizer
        tokenizer.tokenizer_model=work/data/rp2/tokenizer.model
        rng.seed=1234 dataset.random_seed=1234
        scheduler.lr_decay_iters=100 validation.eval_iters=0 validation.eval_interval=0
        dist.distributed_timeout_minutes=30
        ddp.check_for_nan_in_grad=true ddp.check_for_large_grads=true
        rerun_state_machine.check_for_nan_in_loss=true
        --load_dir work/model-verification/qwen3-8b/pretrain-reference-checkpoints
        --save_dir work/model-verification/qwen3-8b/pretrain-resumed-from-reference-checkpoints
        --save_interval 50 checkpoint.ckpt_step=50
        logger.log_interval=1 logger.log_throughput=true logger.tensorboard_dir=null
      last_verified: 2026-07-21
      metrics:
        initial_loss: 7.015641
        final_loss: 6.190785
        last_10_steps_step_time_ms_avg: 24995.610
        last_10_steps_model_tflops_per_gpu_avg: 514.240
      resume_comparison:
        reference_item: pretrain
        sentinel_steps: [51, 100]
        loss_relative_tolerance: 1.0e-2
        loss_absolute_tolerance: 1.0e-6
        sentinels_match: true
      expected_result: >
        The direct 16-GPU continuation restores optimizer, scheduler,
        data-order, and RNG state from iter_0000050, begins at step 51, and
        finishes exactly at step 100 in a distinct output root at TP1/PP1/CP1,
        DP16, GBS/MBS 1024/1, and 64-way gradient accumulation. All 50 losses
        are finite with no skipped or NaN iterations, all four metrics are
        recorded, the post-setup configuration persists, and a complete
        16-shard iter_0000100 checkpoint is saved. Step-51 resumed/reference
        loss is 7.015641/7.015641. Step-100 resumed/reference loss is
        6.190785/6.190218, an absolute difference of 0.000567. This difference
        does not meet the card's previous 1e-6-relative threshold; this verified
        result uses the model-verification skill's standard 1%-relative gate,
        which was fixed for this 16-GPU execution layout before the run.
