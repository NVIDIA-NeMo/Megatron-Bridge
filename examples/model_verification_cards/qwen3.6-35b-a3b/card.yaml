# Agent-readable model verification card.
# status: unverified | verified | unsupported | not_applicable

title: qwen3_6_35b_a3b
summary: >
  Performance disclaimer: this model has not been performance-tuned; reported
  timing and throughput metrics are sanity checks, not optimized performance
  results. Public identity decision: the canonical checkpoint is
  Qwen/Qwen3.6-35B-A3B even though its name has no VL suffix. Its public task is
  image-text-to-text and its Transformers architecture is
  Qwen3_5MoeForConditionalGeneration, matching the shared Qwen3.5/Qwen3.6
  vision-language Bridge implementation. The common architecture is configured
  dynamically from each checkpoint; the existing Qwen3.5 35B recipe remains a
  Qwen3.5 checkpoint preset and is not relabeled as Qwen3.6. Functional
  finetuning is intended to use mmoukouba/MedPix-VQA at immutable revision
  69eb219d477ab8699296da1fd6b89beb768042d3 through processor-native image
  and text conversations once a public recipe can instantiate the exact
  Qwen3.6 checkpoint. No model-scale GPU workflow below has been executed yet.
verification_index:
  model_level:
    unverified:
      - hf_to_megatron_cpu
      - hf_to_megatron_gpu
      - megatron_to_hf_cpu
      - megatron_to_hf_gpu
      - manual_forward_pass
      - inference
  training:
    H100:
      unverified: [pretrain, sft, sft_export_inference, sft_long_context, peft, checkpoint_resume]
    GB200:
      unverified: [pretrain, sft, sft_export_inference, sft_long_context, peft, checkpoint_resume]
model:
  hf_id: Qwen/Qwen3.6-35B-A3B
  hf_revision: 995ad96eacd98c81ed38be0c5b274b04031597b0  # pragma: allowlist secret
  architecture: Qwen3_5MoeForConditionalGeneration
  min_transformers_version: "5.8.1"
verification_environment:
  base_container: nvcr.io/nvidia/pytorch:26.04-py3
  bridge_commit: ebdef7c11b14bec53c4abedf4783bb75d70ef406  # pragma: allowlist secret

items:
  hf_to_megatron_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu
      --nodes 1 --hf-model Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --megatron-path work/model-verification/qwen3.6-35b-a3b/cpu-megatron
      --torch-dtype bfloat16
    last_verified: null
    expected_result: >
      The pinned-revision import must exit successfully and create
      iter_0000000. Before verification, strict inventory evidence must show
      that every expected language, vision, projection, router, shared-expert,
      routed-expert, and packed Qwen3.6 MTP tensor has the expected key, shape,
      dtype, and value after a CPU round-trip; tensor counts and comparison
      totals must be recorded rather than inferred from support metadata.

  hf_to_megatron_gpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 2 --gpus-per-node 8 --hf-model Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --megatron-path work/model-verification/qwen3.6-35b-a3b/imported-megatron
      --torch-dtype bfloat16 --tp 2 --pp 1 --ep 16 --etp 1
    last_verified: null
    expected_result: >
      The 16-GPU pinned-revision import must exit successfully and create a
      complete iter_0000000 distributed checkpoint at TP2/PP1/EP16/ETP1.
      Strict inventory evidence must cover language, vision, projection, MoE,
      shared-expert, and packed MTP tensors, and a reload must report no missing,
      unexpected, shape-mismatched, or dtype-mismatched weights.

  megatron_to_hf_cpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu
      --nodes 1 --hf-model Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --megatron-path work/model-verification/qwen3.6-35b-a3b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/qwen3.6-35b-a3b/cpu-hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
    last_verified: null
    expected_result: >
      Export must exit successfully and Transformers must strictly reload the
      result as Qwen3_5MoeForConditionalGeneration. The exported config must
      preserve the 40-layer, 256-expert, top-8 multimodal geometry and one MTP
      layer, and a complete tensor inventory must match the pinned source after
      the CPU round-trip with no dropped vision or packed next-token weights.

  megatron_to_hf_gpu:
    status: unverified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 2 --gpus-per-node 8 --hf-model Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --megatron-path work/model-verification/qwen3.6-35b-a3b/imported-megatron/iter_0000000
      --hf-path work/model-verification/qwen3.6-35b-a3b/hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 2 --pp 1 --ep 16 --etp 1
    last_verified: null
    expected_result: >
      Distributed export must exit successfully, write a complete indexed BF16
      checkpoint, and strictly reload without missing or unexpected keys.
      Recorded inventory evidence must prove that all language, vision,
      projection, router, expert, shared-expert, and packed MTP tensors match
      the pinned source in key, shape, dtype, and value.

  manual_forward_pass:
    status: unverified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/compare_hf_and_megatron/compare.py
      --hf_model_path Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --model_class Qwen3_5MoeForConditionalGeneration
      --megatron_model_path
      work/model-verification/qwen3.6-35b-a3b/imported-megatron/iter_0000000
      --tp 1 --pp 8 --ep 1 --etp 1
      --image_path work/data/medpix/verification.png
      --prompt "What was observed in the imaging?"
    last_verified: null
    expected_result: >
      Materialize verification.png from one recorded row of the pinned MedPix
      validation split before running this command. TP1 makes the
      processor-expanded multimodal prompt length divisible by tensor
      parallelism. The pinned one-step comparison must report matching HF and
      Megatron next-token IDs and decoded tokens, cosine similarity at least
      0.99, and finite maximum and mean absolute logit differences; the exact
      token IDs, similarity, and differences must be recorded before this item
      is marked verified.

  inference:
    status: unverified
    precision: bf16
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
      examples/conversion/hf_to_megatron_generate_vlm.py
      --hf_model_path Qwen/Qwen3.6-35B-A3B
      --hf-revision 995ad96eacd98c81ed38be0c5b274b04031597b0
      --megatron_model_path
      work/model-verification/qwen3.6-35b-a3b/imported-megatron/iter_0000000
      --tp 2 --pp 1 --ep 8 --etp 1
      --image_path work/data/medpix/verification.png
      --prompt "What was observed in the imaging?"
      --max_new_tokens 32 --exact-new-tokens
    last_verified: null
    expected_result: >
      After materializing the recorded MedPix validation image, two independent
      greedy executions must load the imported checkpoint, consume both image
      pixels and text through the Qwen processor, and produce byte-identical
      32-token completions. Before verification, the literal quoted completion
      must be recorded; an early end-of-sequence or a text-only path does not
      satisfy this gate.

  pretrain:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        No pretraining run is claimed. MedPix is a supervised multimodal
        question-answer dataset and the public launcher correctly treats it as
        finetuning data, so it cannot be substituted mechanically into the
        pretrain loop. A future pretrain verification requires a public recipe
        path that instantiates the exact Qwen3.6 checkpoint, a suitable pinned
        pretraining corpus, finite loss movement, all four metrics, and a
        reloadable full-state checkpoint.

  sft:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        No Qwen3.6-specific recipe is added by this card. The existing Qwen3.5
        35B preset uses the shared architecture implementation but hard-codes
        the Qwen3.5 checkpoint and configuration, so it must not be presented as
        a Qwen3.6 training command. Future verification must instantiate the
        pinned Qwen3.6 checkpoint, adapt pinned MedPix image_id, question, and
        answer fields into processor-native conversations, preserve image and
        label metadata through qwen3_vl_step, complete a bounded SFT run with
        finite loss, record all four metrics, and strictly reload its checkpoint.

  sft_export_inference:
    H100:
      status: unverified
      precision: bf16
      depends_on: sft
      commands: null
      last_verified: null
      expected_result: >
        No export command is claimed until an exact Qwen3.6 SFT workflow
        produces a reloadable checkpoint. Future verification must export every
        language, vision, projection, MoE, shared-expert, and MTP weight to an
        indexed BF16 HF checkpoint, strictly reload it, and use the
        processor-native image verifier to generate exactly 32 new greedy
        tokens twice. Tensor counts, serialized byte totals, and the literal
        byte-identical completion must be recorded before this item is marked
        verified.

  sft_long_context:
    H100:
      status: unverified
      precision: bf16
      enabled_features:
        sequence_packing: in_batch
        context_parallel_size: 2
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        No executable long-context command is claimed without an exact
        Qwen3.6 training configuration. Future verification must use pinned
        MedPix, enable processor-native deferred in-batch packing together with
        context parallelism greater than one, preserve image tensors and
        multimodal positions through CP slicing, and record finite loss plus all
        four metrics.

  peft:
    H100:
      status: unverified
      precision: bf16
      enabled_features: {}
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      expected_result: >
        No executable PEFT command is claimed without an exact Qwen3.6 training
        configuration. Future verification must use the pinned Qwen3.6
        checkpoint and MedPix revision, preserve processor-native image and
        label metadata through qwen3_vl_step, verify the declared adapter target
        modules exist, record finite loss plus all four metrics, and strictly
        reload the resulting adapter checkpoint.

  checkpoint_resume:
    H100:
      status: unverified
      precision: bf16
      depends_on: pretrain
      command: null
      last_verified: null
      metrics:
        initial_loss: null
        final_loss: null
        last_10_steps_step_time_ms_avg: null
        last_10_steps_model_tflops_per_gpu_avg: null
      resume_comparison:
        reference_item: pretrain
        sentinel_steps: [51, 100]
        loss_relative_tolerance: 1.0e-2
        loss_absolute_tolerance: 1.0e-6
        sentinels_match: null
      expected_result: >
        No resume result is claimed because the required uninterrupted
        pretraining reference is also unverified. A future run must restore
        full optimizer, scheduler, RNG, and data-order state from step 50 into
        a distinct output root, resume at step 51, finish at step 100, record
        all four metrics, and match steps 51 and 100 against the uninterrupted
        reference within the declared tolerances.
