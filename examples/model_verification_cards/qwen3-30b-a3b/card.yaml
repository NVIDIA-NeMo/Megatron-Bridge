# Agent-readable model verification card.
# status: unverified | verified | unsupported | not_applicable

title: qwen3_30b_a3b
summary: >
  Performance scope: only pretrain_performance.H100 uses the tuned canonical
  performance recipe; timing and throughput metrics from functional training
  items remain sanity checks rather than optimized performance results.
  Qwen3-30B-A3B support verification covers conversion, inference, and training.
verification_index:
  model_level:
    verified:
      - hf_to_megatron_cpu
      - hf_to_megatron_gpu
      - megatron_to_hf_cpu
      - megatron_to_hf_gpu
      - manual_forward_pass
      - inference
  training:
    H100:
      verified: [pretrain, sft, sft_export_inference, sft_long_context, peft, checkpoint_resume]
    GB200:
      verified: [pretrain]
      unverified: [sft, sft_export_inference, sft_long_context, peft, checkpoint_resume]
  performance:
    H100: verified
model:
  hf_id: Qwen/Qwen3-30B-A3B
  hf_revision: ad44e777bcd18fa416d9da3bd8f70d33ebb85d39  # pragma: allowlist secret
  architecture: Qwen3MoeForCausalLM
  min_transformers_version: "5.8.1"
verification_environment:
  base_container: nvcr.io/nvidia/nemo:26.06
  bridge_commit: aabb29d0ed15fc7ed881f0538352c6bd2d2fd52d  # pragma: allowlist secret

items:
  hf_to_megatron_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device cpu --nodes 1
      --hf-model Qwen/Qwen3-30B-A3B
      --megatron-path work/model-verification/qwen3-30b-a3b/cpu-megatron
      --torch-dtype bfloat16
    last_verified: 2026-07-17
    expected_result: >
      The command exits successfully, creates iter_0000000, and the checkpoint
      round-trips through CPU export with all 18,867 BF16 tensors matching the
      recorded HF revision bitwise.

  hf_to_megatron_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh import --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model Qwen/Qwen3-30B-A3B
      --megatron-path work/model-verification/qwen3-30b-a3b/imported-megatron
      --torch-dtype bfloat16 --tp 4 --pp 2 --ep 4
    last_verified: 2026-07-17
    expected_result: >
      The command exits successfully, creates iter_0000000, and all 18,867 BF16
      tensors reload with keys, shapes, dtypes, and values exactly matching the
      recorded HF revision.

  megatron_to_hf_cpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device cpu --nodes 1
      --hf-model Qwen/Qwen3-30B-A3B
      --megatron-path work/model-verification/qwen3-30b-a3b/cpu-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-30b-a3b/cpu-hf-export
      --torch-dtype bfloat16
    last_verified: 2026-07-17
    expected_result: >
      The command exits successfully; all 18,867 exported BF16 tensors match
      the recorded HF revision bitwise, norm_topk_prob remains true, and the
      export reloads as Qwen3MoeForCausalLM without missing or unexpected keys.

  megatron_to_hf_gpu:
    status: verified
    precision: bf16
    command: >
      ./scripts/conversion/convert.sh export --executor slurm --device gpu
      --nodes 1 --gpus-per-node 8
      --hf-model Qwen/Qwen3-30B-A3B
      --megatron-path work/model-verification/qwen3-30b-a3b/imported-megatron/iter_0000000
      --hf-path work/model-verification/qwen3-30b-a3b/hf-export
      --torch-dtype bfloat16 --export-weight-dtype bfloat16
      --distributed-save --tp 4 --pp 2 --ep 4
    last_verified: 2026-07-17
    expected_result: >
      Strict export exits successfully, all 18,867 written BF16 tensors match
      the recorded HF revision bitwise, norm_topk_prob remains true, and
      Transformers reloads the output as Qwen3MoeForCausalLM without missing or
      unexpected keys.

  manual_forward_pass:
    status: verified
    precision: bf16
    bridge_commit: 24f3dcde1fe27a1c3f1097b94d69b38e37a57415  # pragma: allowlist secret
    command: >
      uv run python -m torch.distributed.run --standalone --nproc_per_node=8
